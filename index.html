<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Custom MP3 Player</title>
   <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212; /* Dark background like Spotify */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            margin-top: 0;
            color: #1DB954; /* Spotify Green accent */
        }
        #audioPlayer {
            width: 100%;
            margin: 20px 0;
        }
        controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s, transform 0.1s;
        }
        #importButton {
            background-color: #1DB954;
            color: white;
            font-weight: bold;
        }
        #importButton:hover {
            background-color: #00A844;
        }

        div#message {
            margin-top: 15px;
            padding: 8px;
            background-color: #3a3a3a;
            border-radius: 4px;
            color: #FFD700; /* Gold/Yellow for info */
            min-height: 20px;
        }
    </style>
</head>
<body>

   <div class="player-container">
       <h1>🎵 My Custom Player</h1>
        
        <!-- 1. Audio Element -->
       <audio id="audioPlayer" controls></audio>

        <!-- 2. Hidden File Input Selector -->
        <!-- Changed id from empty to "audioFileSelector" so JS can find it -->
       <input type="file" id="audioFileSelector" style="display: none;">

        <!-- 3. Action Button -->
       <button id="importButton">📂 Import MP3 File</button>

        <!-- Status Message -->
       <div id="message">Select an MP3 file to begin playing!</div>
    </div>

   <script>
        // --- 1. Select Elements ---
        const audioPlayer = document.getElementById('audioPlayer');
        const importButton = document.getElementById('importButton');
        const messageDisplay = document.getElementById('message');
        // This fix selects the input element that now exists in HTML with ID 'audioFileSelector'
        const fileInput = document.getElementById('audioFileSelector');

        function showMessage(msg, isError = false) {
            messageDisplay.textContent = msg;
            if (isError) {
                messageDisplay.style.borderColor = "red";
                messageDisplay.style.color = "#ff6b6b";
            } else {
                messageDisplay.style.borderColor = "transparent";
                messageDisplay.style.color = "#FFD700";
            }
        }

        // --- 2. Event Listener for the button ---
        importButton.addEventListener('click', () => {
            // Clicks the hidden input to open file picker
            fileInput.click(); 
        });

        // --- 3. Event Listener for File Upload --
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];

            if (file) {
                // Check if it's an audio file type
                if (file.type.startsWith('audio/')) {
                    playAudio(file);
                } else if (file.name.toLowerCase().endsWith('.mp3')) {
                    playAudio(file);
                } else {
                    // Fallback to name check if strict type check fails
                    showMessage('Error: Please select a valid MP3 file.', true);
                }
            } else {
                showMessage('No audio file selected.', true);
            }
        });

        // --- 4. Core Function --
        function playAudio(file) {
            const fileURL = URL.createObjectURL(file);
            
            // Update audio element source
            audioPlayer.src = fileURL;
            
            // UI Feedback
            showMessage(`Now playing: ${file.name}`);
            
            try {
                audioPlayer.play().then(() => {
                    console.log("Playback started.");
                }).catch(error => {
                    console.error("Autoplay prevented or error:", error);
                    showMessage("Playback Error. Try refreshing.", true);
                });
            } catch (e) {
                showMessage("Playback error. Try refreshing.", true);
            }

        }
    </script>
</body>
</html>
