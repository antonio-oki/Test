<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macintosh System 1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot">
    <div id="bootText">Starting Macintosh...</div>
</div>

<!-- MAIN SYSTEM -->
<div id="system">

<select id="resolutionSelect">
    <option value="512x342">512×342</option>
    <option value="640x480">640×480</option>
    <option value="800x600">800×600</option>
    <option value="fullscreen">Fullscreen</option>
</select>

<div id="screen">

    <div id="menubar">
         File Edit View Special
    </div>

    <div id="desktop">

        <div class="icon" data-app="write">
            📄
            <span>Write</span>
        </div>

        <div class="icon" data-app="calc">
            🧮
            <span>Calculator</span>
        </div>

        <div id="trash">🗑️ Trash</div>

        <div id="writeWindow" class="window">
            <div class="titlebar">Write</div>
            <div class="content">
                <textarea>Welcome</textarea>
            </div>
        </div>

        <div id="calcWindow" class="window">
            <div class="titlebar">Calculator</div>
            <div class="content">
                <input id="calcInput">
                <div id="calcOut"></div>
            </div>
        </div>

    </div>
</div>

<div id="cursor"></div>

</div>

<script src="script.js"></script>
</body>
</html>
