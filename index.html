<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Frame Editor</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.18);
    --glass-blur: blur(28px) saturate(200%);
    --glass-bg-strong: rgba(255,255,255,0.14);
    --accent: #00d4ff;
    --accent2: #a259ff;
    --danger: #ff453a;
    --success: #32d74b;
    --text: #fff;
    --text-secondary: rgba(255,255,255,0.55);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    background: #050510;
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: calc(var(--safe-top) + 12px);
    padding-bottom: calc(var(--safe-bottom) + 20px);
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,212,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(162,89,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,30,60,0.5) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 16px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 40%, rgba(0,212,255,0.8));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }
  .frame-badge {
    background: var(--glass-bg-strong);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    transition: all 0.3s ease;
  }

  /* Glass card */
  .glass-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: var(--radius-xl);
    overflow: hidden;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed rgba(255,255,255,0.25);
    border-radius: var(--radius-xl);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .upload-zone:active { transform: scale(0.98); }
  .upload-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,212,255,0.08), transparent 70%);
  }
  .upload-icon {
    font-size: 42px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 16px rgba(0,212,255,0.4));
  }
  .upload-label {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    display: block;
    margin-bottom: 4px;
  }
  .upload-hint {
    font-size: 13px;
    color: var(--text-secondary);
  }
  input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* Video area */
  #video-area { display: none; margin-top: 16px; }
  #video-area.visible { display: block; }

  video {
    width: 100%;
    display: block;
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    background: #000;
    max-height: 260px;
    object-fit: contain;
  }
  canvas { display: none; }

  /* Video info bar */
  .video-info-bar {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--glass-border);
    background: rgba(0,0,0,0.2);
  }
  .time-display {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }
  .video-total-frames {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .fps-pill {
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 100px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }

  /* Controls grid */
  .controls-section {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Playback row */
  .playback-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  /* Step controls */
  .step-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .step-indicator {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Action row */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  /* Buttons */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 10px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .btn:active::after { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.96); }

  .btn-icon { font-size: 18px; }
  .btn-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .btn-content { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .btn-primary {
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(162,89,255,0.2));
    border-color: rgba(0,212,255,0.4);
    color: var(--accent);
  }
  .btn-danger {
    background: rgba(255,69,58,0.12);
    border-color: rgba(255,69,58,0.3);
    color: var(--danger);
  }
  .btn-success {
    background: rgba(50,215,75,0.12);
    border-color: rgba(50,215,75,0.3);
    color: var(--success);
  }
  .btn-warning {
    background: rgba(255,159,0,0.12);
    border-color: rgba(255,159,0,0.3);
    color: #ff9f00;
  }
  .btn:disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  /* Scrubber */
  .scrubber-wrap {
    padding: 4px 4px 0;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 100px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,212,255,0.6), 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }

  /* Frames section */
  .frames-section {
    margin-top: 20px;
  }
  .frames-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .frames-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .frames-count-badge {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .frames-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 4px 2px 12px;
    scrollbar-width: none;
  }
  .frames-scroll::-webkit-scrollbar { display: none; }

  .frame-thumb {
    flex-shrink: 0;
    width: 88px;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 2px solid var(--glass-border);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    background: #000;
  }
  .frame-thumb img {
    width: 100%;
    height: 60px;
    object-fit: cover;
    display: block;
  }
  .frame-thumb.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(0,212,255,0.3);
    transform: scale(1.04);
  }
  .frame-thumb .frame-num {
    position: absolute;
    bottom: 3px; left: 4px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 1px 5px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }
  .frame-thumb .frame-del {
    position: absolute;
    top: 3px; right: 3px;
    width: 18px; height: 18px;
    background: rgba(255,69,58,0.85);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .frame-thumb.selected .frame-del { opacity: 1; }

  /* Empty state */
  .empty-frames {
    text-align: center;
    padding: 28px 20px;
    color: var(--text-secondary);
    font-size: 14px;
    border: 1.5px dashed rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .empty-frames .empty-icon { font-size: 32px; opacity: 0.5; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 32px);
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--glass-bg-strong);
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    z-index: 100;
    white-space: nowrap;
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.35s;
    opacity: 0;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Shimmer animation for glow */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Section divider */
  .divider {
    height: 1px;
    background: var(--glass-border);
    margin: 16px 0;
    border-radius: 1px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Frame Editor</div>
      <div class="header-sub">iOS 26 · Video Tools</div>
    </div>
    <div class="frame-badge" id="header-badge">No Video</div>
  </div>

  <!-- Upload zone -->
  <div class="upload-zone glass-card" id="upload-zone">
    <input type="file" id="upload" accept="video/*">
    <span class="upload-icon">🎬</span>
    <span class="upload-label">Tap to load a video</span>
    <span class="upload-hint">MP4, MOV, and more</span>
  </div>

  <!-- Video area (hidden until loaded) -->
  <div id="video-area" class="glass-card">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <!-- Scrubber -->
    <div class="scrubber-wrap" style="padding: 12px 16px 8px;">
      <input type="range" id="scrubber" min="0" max="100" step="0.01" value="0">
    </div>

    <!-- Info bar -->
    <div class="video-info-bar">
      <div>
        <div class="time-display" id="time-display">0:00.000</div>
        <div class="video-total-frames" id="total-frames-label">— total frames</div>
      </div>
      <div class="fps-pill" id="fps-pill">30 fps</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-section" id="controls-section" style="display:none;">

    <!-- Playback buttons -->
    <div class="playback-row">
      <button class="btn" onclick="togglePlay()" id="play-btn">
        <div class="btn-content">
          <span class="btn-icon">▶️</span>
          <span class="btn-label">Play</span>
        </div>
      </button>
      <button class="btn btn-primary" onclick="capture()">
        <div class="btn-content">
          <span class="btn-icon">📸</span>
          <span class="btn-label">Capture</span>
        </div>
      </button>
      <button class="btn btn-warning" onclick="undo()" id="undo-btn" disabled>
        <div class="btn-content">
          <span class="btn-icon">↩️</span>
          <span class="btn-label">Undo</span>
        </div>
      </button>
    </div>

    <!-- Step controls -->
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;">
      <button class="btn" onclick="step(-10)">
        <div class="btn-content">
          <span class="btn-icon">⏮</span>
          <span class="btn-label">−10f</span>
        </div>
      </button>
      <button class="btn" onclick="step(-1)">
        <div class="btn-content">
          <span class="btn-icon">◀</span>
          <span class="btn-label">Prev</span>
        </div>
      </button>
      <button class="btn" onclick="step(1)">
        <div class="btn-content">
          <span class="btn-icon">▶</span>
          <span class="btn-label">Next</span>
        </div>
      </button>
      <button class="btn" onclick="step(10)">
        <div class="btn-content">
          <span class="btn-icon">⏭</span>
          <span class="btn-label">+10f</span>
        </div>
      </button>
    </div>

    <!-- Delete selected -->
    <button class="btn btn-danger" onclick="delSelected()" id="del-btn" disabled>
      <div class="btn-content" style="flex-direction:row; gap:8px;">
        <span class="btn-icon">🗑</span>
        <span style="font-size:14px;">Delete Selected Frame</span>
      </div>
    </button>

    <!-- Export -->
    <button class="btn btn-success" onclick="exportFrames()" id="export-btn" disabled>
      <div class="btn-content" style="flex-direction:row; gap:8px;">
        <span class="btn-icon">⬇️</span>
        <span style="font-size:14px;">Export All Frames</span>
      </div>
    </button>

  </div>

  <div class="divider" id="main-divider" style="display:none;"></div>

  <!-- Frames tray -->
  <div class="frames-section" id="frames-section" style="display:none;">
    <div class="frames-header">
      <span class="frames-title">Captured Frames</span>
      <span class="frames-count-badge" id="frames-count-badge">0 frames</span>
    </div>
    <div class="frames-scroll" id="frames-scroll"></div>
    <div class="empty-frames" id="empty-state">
      <span class="empty-icon">🖼️</span>
      <span>No frames captured yet</span>
      <span style="font-size:12px;">Scrub to a moment and tap Capture</span>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scrubber = document.getElementById('scrubber');

let frames = [];
let history = []; // for undo
let selected = -1;
let fps = 30;
let duration = 0;
let isScrubbing = false;

// Upload handler
document.getElementById('upload').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  video.src = URL.createObjectURL(file);
  document.getElementById('upload-zone').style.display = 'none';
};

video.onloadedmetadata = () => {
  duration = video.duration;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  scrubber.max = duration;
  scrubber.step = 1 / fps;

  const totalFrames = Math.round(duration * fps);
  document.getElementById('total-frames-label').textContent = `~${totalFrames.toLocaleString()} frames @ ${fps}fps`;
  document.getElementById('header-badge').textContent = formatTime(duration);
  document.getElementById('fps-pill').textContent = `${fps} fps`;

  document.getElementById('video-area').classList.add('visible');
  document.getElementById('controls-section').style.display = 'flex';
  document.getElementById('frames-section').style.display = 'block';
  document.getElementById('main-divider').style.display = 'block';
};

video.onseeked = () => {
  if (!video.paused) return;
  drawFrame();
};

video.ontimeupdate = () => {
  updateTimeDisplay();
  if (!isScrubbing) scrubber.value = video.currentTime;
};

video.onplay = () => {
  document.getElementById('play-btn').querySelector('.btn-icon').textContent = '⏸️';
  document.getElementById('play-btn').querySelector('.btn-label').textContent = 'Pause';
};
video.onpause = () => {
  document.getElementById('play-btn').querySelector('.btn-icon').textContent = '▶️';
  document.getElementById('play-btn').querySelector('.btn-label').textContent = 'Play';
  drawFrame();
};

// Scrubber
scrubber.addEventListener('input', () => {
  isScrubbing = true;
  video.pause();
  video.currentTime = parseFloat(scrubber.value);
});
scrubber.addEventListener('change', () => {
  isScrubbing = false;
});

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const ms = Math.round((t % 1) * 1000);
  return `${m}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function updateTimeDisplay() {
  const t = video.currentTime;
  document.getElementById('time-display').textContent = formatTime(t);
  const frameNum = Math.round(t * fps);
  const totalFrames = Math.round(duration * fps);
  document.getElementById('total-frames-label').textContent =
    `Frame ${frameNum.toLocaleString()} / ~${totalFrames.toLocaleString()}`;
}

function drawFrame() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
}

function togglePlay() {
  video.paused ? video.play() : video.pause();
}

function step(n) {
  video.pause();
  video.currentTime = Math.max(0, Math.min(duration, video.currentTime + n / fps));
}

function capture() {
  video.pause();
  drawFrame();
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  history.push({ type: 'add', index: frames.length });
  frames.push({ src: dataUrl, time: video.currentTime });
  selected = frames.length - 1;
  renderFrames();
  updateExportBtn();
  document.getElementById('undo-btn').disabled = false;
  showToast(`📸 Frame captured at ${formatTime(video.currentTime)}`);
}

function delSelected() {
  if (selected < 0 || selected >= frames.length) return;
  history.push({ type: 'delete', index: selected, frame: frames[selected] });
  frames.splice(selected, 1);
  selected = Math.min(selected, frames.length - 1);
  if (frames.length === 0) selected = -1;
  renderFrames();
  updateExportBtn();
  document.getElementById('del-btn').disabled = true;
  document.getElementById('undo-btn').disabled = history.length === 0;
  showToast('🗑 Frame deleted');
}

function undo() {
  if (history.length === 0) return;
  const action = history.pop();
  if (action.type === 'add') {
    frames.splice(action.index, 1);
    selected = -1;
  } else if (action.type === 'delete') {
    frames.splice(action.index, 0, action.frame);
    selected = action.index;
  }
  renderFrames();
  updateExportBtn();
  document.getElementById('undo-btn').disabled = history.length === 0;
  showToast('↩️ Undone');
}

function renderFrames() {
  const container = document.getElementById('frames-scroll');
  const empty = document.getElementById('empty-state');
  const badge = document.getElementById('frames-count-badge');

  badge.textContent = `${frames.length} frame${frames.length !== 1 ? 's' : ''}`;
  document.getElementById('del-btn').disabled = selected < 0;

  if (frames.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = '';
  frames.forEach((f, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'frame-thumb' + (i === selected ? ' selected' : '');

    const img = document.createElement('img');
    img.src = f.src;

    const num = document.createElement('div');
    num.className = 'frame-num';
    num.textContent = `#${i + 1} · ${formatTime(f.time)}`;

    const del = document.createElement('div');
    del.className = 'frame-del';
    del.textContent = '✕';
    del.onclick = e => {
      e.stopPropagation();
      selected = i;
      delSelected();
    };

    thumb.appendChild(img);
    thumb.appendChild(num);
    thumb.appendChild(del);
    thumb.onclick = () => {
      selected = i;
      renderFrames();
      // Seek video to that frame's time
      video.pause();
      video.currentTime = f.time;
    };

    container.appendChild(thumb);
    if (i === selected) {
      setTimeout(() => thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 50);
    }
  });
}

function updateExportBtn() {
  document.getElementById('export-btn').disabled = frames.length === 0;
}

function exportFrames() {
  if (frames.length === 0) return;
  frames.forEach((f, i) => {
    const a = document.createElement('a');
    a.href = f.src;
    a.download = `frame-${String(i + 1).padStart(3, '0')}-${f.time.toFixed(3)}s.jpg`;
    a.click();
  });
  showToast(`⬇️ Exporting ${frames.length} frames`);
}

// Toast system
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
