<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Whispering Pines — Open World Forest</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0f0a; font-family:'Segoe UI',system-ui,sans-serif; }
  #c { position:fixed; inset:0; display:block; touch-action:none; }

  #loader {
    position:fixed; inset:0; background:linear-gradient(180deg,#0c1a12 0%,#050a06 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50;
    transition:opacity 1.2s ease; color:#cfe4cf;
  }
  #loader h1 { font-weight:200; letter-spacing:0.35em; font-size:clamp(18px,4vw,30px); text-transform:uppercase; margin-bottom:8px; }
  #loader p  { font-size:12px; letter-spacing:0.2em; opacity:0.6; text-transform:uppercase; }
  .bar { width:min(240px,60vw); height:2px; background:#1e3325; margin-top:26px; border-radius:2px; overflow:hidden; }
  .bar div { height:100%; width:0%; background:#8fd694; transition:width .3s; }

  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #title {
    position:absolute; top:calc(14px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.85); font-size:11px; letter-spacing:0.4em; text-transform:uppercase;
    text-shadow:0 1px 8px rgba(0,0,0,0.6); opacity:0; transition:opacity 2s;
  }
  #weather {
    position:absolute; top:calc(14px + env(safe-area-inset-top)); right:16px;
    color:rgba(255,255,255,0.9); font-size:12px; letter-spacing:0.12em;
    text-shadow:0 1px 6px rgba(0,0,0,0.7); text-align:right; line-height:1.7;
    opacity:0; transition:opacity 2s;
  }
  #weather b { font-size:15px; }
  #hint {
    position:absolute; bottom:calc(150px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.7); font-size:11px; letter-spacing:0.12em; text-align:center;
    text-shadow:0 1px 6px rgba(0,0,0,0.7); opacity:0; transition:opacity 1.5s; white-space:nowrap;
  }
  #warn {
    position:absolute; top:20%; left:50%; transform:translateX(-50%);
    color:#ff5544; font-size:clamp(14px,3.5vw,22px); letter-spacing:0.3em; text-transform:uppercase;
    text-shadow:0 0 18px rgba(255,60,40,0.8); opacity:0; transition:opacity 0.8s; font-weight:600;
    animation:pulse 1.1s infinite;
  }
  @keyframes pulse { 50% { opacity:0.35; } }
  #warn.off { animation:none; opacity:0 !important; }

  #joy {
    position:fixed; left:26px; bottom:calc(26px + env(safe-area-inset-bottom));
    width:120px; height:120px; border-radius:50%; z-index:20;
    background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.10) 100%);
    border:1.5px solid rgba(255,255,255,0.28); backdrop-filter:blur(2px);
    display:none; touch-action:none;
  }
  #knob {
    position:absolute; left:50%; top:50%; width:52px; height:52px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.65),rgba(200,220,205,0.28));
    border:1px solid rgba(255,255,255,0.5); box-shadow:0 3px 12px rgba(0,0,0,0.35);
  }
  #sprint {
    position:fixed; right:26px; bottom:calc(40px + env(safe-area-inset-bottom));
    width:72px; height:72px; border-radius:50%; z-index:20;
    background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.3);
    color:rgba(255,255,255,0.85); font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    display:none; align-items:center; justify-content:center; touch-action:none; backdrop-filter:blur(2px);
    user-select:none;
  }
  #sprint.on { background:rgba(143,214,148,0.35); border-color:rgba(143,214,148,0.8); }
  .touch #joy, .touch #sprint { display:flex; }
</style>
</head>
<body>
<div id="loader">
  <h1>Whispering Pines</h1>
  <p>Growing the forest…</p>
  <div class="bar"><div id="prog"></div></div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="title">Whispering Pines</div>
  <div id="weather"><b id="wIcon">☀️</b><br><span id="wName">Clear</span><br><span id="wTime">12:00</span></div>
  <div id="hint"></div>
  <div id="warn" class="off">⚠ Tornado Warning ⚠</div>
</div>

<div id="joy"><div id="knob"></div></div>
<div id="sprint">Sprint</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouch) document.body.classList.add('touch');
const prog = v => document.getElementById('prog').style.width = (v*100)+'%';

/* ================= NOISE ================= */
function hash(x, y){ let n = Math.sin(x*127.1 + y*311.7) * 43758.5453123; return n - Math.floor(n); }
function vnoise(x, y){
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf*xf*(3-2*xf), v = yf*yf*(3-2*yf);
  const a = hash(xi,yi), b = hash(xi+1,yi), c = hash(xi,yi+1), d = hash(xi+1,yi+1);
  return (a + (b-a)*u + (c-a)*v + (a-b-c+d)*u*v) * 2 - 1;
}
function fbm(x, y, oct){
  let v = 0, amp = 0.5, f = 1;
  for(let i=0;i<oct;i++){ v += vnoise(x*f, y*f)*amp; amp*=0.5; f*=2.02; }
  return v;
}

/* ================= TERRAIN ================= */
const WORLD = 640;
const LAKE = { x: 40, z: -55, r: 78 };
const WATER_Y = 0.0;
function terrainH(x, z){
  let h = fbm(x*0.006+13.7, z*0.006+7.3, 4) * 26 + fbm(x*0.028, z*0.028, 3) * 3.2 + 6.5;
  const dc = Math.sqrt(x*x + z*z) / (WORLD*0.5);
  h += dc*dc * 22;
  const dx = x-LAKE.x, dz = z-LAKE.z;
  const d = Math.sqrt(dx*dx + dz*dz);
  h -= 16 * Math.exp(-(d*d)/(LAKE.r*LAKE.r));
  return h;
}

/* ================= RENDERER / SCENE ================= */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isTouch ? 1.75 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8dce8, 0.0045);
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1400);

/* ================= SKY ================= */
const SUN_DIR = new THREE.Vector3(-0.45, 0.42, 0.55).normalize();
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite:false, fog:false,
  uniforms:{
    sunDir:{ value:SUN_DIR },
    uZen:{ value:new THREE.Color(0.22,0.45,0.78) },
    uHor:{ value:new THREE.Color(0.86,0.90,0.94) },
    uSunCol:{ value:new THREE.Color(1.0,0.92,0.75) },
    uNight:{ value:0 },
    uFlash:{ value:0 },
    uStorm:{ value:0 },
    time:{ value:0 }
  },
  vertexShader:`varying vec3 vDir; void main(){ vDir=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    varying vec3 vDir;
    uniform vec3 sunDir, uZen, uHor, uSunCol;
    uniform float uNight, uFlash, uStorm, time;
    float h3(vec3 p){ return fract(sin(dot(p, vec3(12.989,78.233,37.719)))*43758.5453); }
    void main(){
      float h = max(vDir.y, 0.0);
      vec3 col = mix(uHor, uZen, pow(h, 0.55));
      float sd = max(dot(vDir, sunDir), 0.0);
      float dayVis = (1.0 - uNight);
      col += uSunCol * pow(sd, 900.0) * 18.0 * dayVis;
      col += uSunCol * pow(sd, 12.0)  * 0.22 * dayVis;
      col += uSunCol * pow(sd, 90.0)  * 0.6  * dayVis;
      // moon (opposite the sun)
      float md = max(dot(vDir, -sunDir), 0.0);
      col += vec3(0.85,0.9,1.0) * pow(md, 1400.0) * 5.0 * uNight;
      col += vec3(0.6,0.7,0.9)  * pow(md, 60.0)   * 0.15 * uNight;
      // stars
      vec3 g = floor(vDir*220.0);
      float s = h3(g);
      if (s > 0.997 && vDir.y > 0.02){
        float tw = 0.6 + 0.4*sin(time*3.0 + s*90.0);
        col += vec3(0.9,0.93,1.0) * (s-0.997)/0.003 * tw * uNight * (1.0-uStorm);
      }
      col += vec3(0.9,0.92,1.0) * uFlash;   // lightning
      gl_FragColor = vec4(col, 1.0);
    }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1100, 32, 16), skyMat));

/* ================= LIGHTS ================= */
const hemi = new THREE.HemisphereLight(0xbfd9e8, 0x4a6b3a, 0.85);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2dd, 2.1);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 20; sun.shadow.camera.far = 420;
sun.shadow.camera.left = -95; sun.shadow.camera.right = 95;
sun.shadow.camera.top = 95;  sun.shadow.camera.bottom = -95;
sun.shadow.bias = -0.0006;
scene.add(sun); scene.add(sun.target);

/* ================= GROUND ================= */
prog(0.1);
const SEG = 220;
const gGeo = new THREE.PlaneGeometry(WORLD, WORLD, SEG, SEG);
gGeo.rotateX(-Math.PI/2);
{
  const pos = gGeo.attributes.position;
  const colors = new Float32Array(pos.count*3);
  const cGrassA = new THREE.Color(0x3f7a34), cGrassB = new THREE.Color(0x6da84f);
  const cDirt = new THREE.Color(0x6b5a40), cSand = new THREE.Color(0xc9b98a);
  const cRock = new THREE.Color(0x8a8a86), cDeep = new THREE.Color(0x2f4a2a);
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainH(x,z);
    pos.setY(i, h);
    const e = 1.6;
    const sx = (terrainH(x+e,z)-terrainH(x-e,z))/(2*e);
    const sz = (terrainH(x,z+e)-terrainH(x,z-e))/(2*e);
    const slope = Math.sqrt(sx*sx+sz*sz);
    const n = fbm(x*0.05, z*0.05, 3)*0.5+0.5;
    tmp.copy(cGrassA).lerp(cGrassB, n);
    tmp.lerp(cDeep, THREE.MathUtils.clamp((h-24)/26, 0, 1)*0.5);
    if (h < WATER_Y + 1.6) tmp.lerp(cSand, THREE.MathUtils.clamp((WATER_Y+1.6-h)/1.6, 0, 1));
    if (h < WATER_Y - 0.5) tmp.lerp(new THREE.Color(0x5a5342), 0.6);
    if (slope > 0.55) tmp.lerp(cRock, THREE.MathUtils.clamp((slope-0.55)/0.5, 0, 1));
    else if (slope > 0.35) tmp.lerp(cDirt, (slope-0.35)/0.25*0.5);
    colors[i*3]=tmp.r; colors[i*3+1]=tmp.g; colors[i*3+2]=tmp.b;
  }
  gGeo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  gGeo.computeVertexNormals();
}
const ground = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.95 }));
ground.receiveShadow = true;
scene.add(ground);

/* ================= WATER ================= */
prog(0.22);
const waterGeo = new THREE.PlaneGeometry(LAKE.r*4.4, LAKE.r*4.4, 120, 120);
waterGeo.rotateX(-Math.PI/2);
const waterMat = new THREE.ShaderMaterial({
  transparent:true, fog:false,
  uniforms:{
    time:{value:0}, sunDir:{value:SUN_DIR}, camPos:{value:new THREE.Vector3()},
    fogColor:{value:new THREE.Color(0xc8dce8)}, fogDensity:{value:0.0045},
    uLight:{value:1.0}
  },
  vertexShader:`
    uniform float time;
    varying vec3 vWorld; varying vec3 vNormal;
    float wave(vec2 p, vec2 d, float f, float s){ return sin(dot(p,d)*f + time*s); }
    void main(){
      vec3 p = (modelMatrix * vec4(position,1.0)).xyz;
      float w = 0.0;
      w += wave(p.xz, vec2(1.0,0.3), 0.35, 1.4)*0.09;
      w += wave(p.xz, vec2(-0.6,1.0), 0.55, 1.9)*0.06;
      w += wave(p.xz, vec2(0.2,-1.0), 1.10, 2.6)*0.035;
      p.y += w;
      float e=0.8;
      float wx = (sin((p.x+e)*0.35 + p.z*0.105 + time*1.4) - sin((p.x-e)*0.35 + p.z*0.105 + time*1.4))*0.09;
      float wz = (sin(p.x*0.35 + (p.z+e)*0.105 + time*1.4) - sin(p.x*0.35 + (p.z-e)*0.105 + time*1.4))*0.09;
      vNormal = normalize(vec3(-wx*2.2, 1.0, -wz*2.2));
      vWorld = p;
      gl_Position = projectionMatrix * viewMatrix * vec4(p,1.0);
    }`,
  fragmentShader:`
    uniform vec3 sunDir; uniform vec3 camPos; uniform float time;
    uniform vec3 fogColor; uniform float fogDensity; uniform float uLight;
    varying vec3 vWorld; varying vec3 vNormal;
    void main(){
      vec3 V = normalize(camPos - vWorld);
      vec3 N = normalize(vNormal + vec3(
        sin(vWorld.x*2.3 + time*2.0)*0.03 + sin(vWorld.z*3.1 - time*1.6)*0.02,
        0.0,
        sin(vWorld.z*2.7 + time*1.7)*0.03 + sin(vWorld.x*2.9 + time*2.2)*0.02));
      float fres = clamp(pow(1.0 - max(dot(V,N), 0.0), 3.0), 0.04, 1.0);
      vec3 deep = vec3(0.02, 0.10, 0.12);
      vec3 shallow = vec3(0.05, 0.22, 0.22);
      vec3 skyRef = mix(vec3(0.55,0.68,0.80), vec3(0.30,0.52,0.80), clamp(N.y,0.0,1.0));
      vec3 col = mix(mix(deep, shallow, 0.4), skyRef, fres);
      vec3 R = reflect(-V, N);
      float spec = pow(max(dot(R, sunDir), 0.0), 220.0);
      col += vec3(1.0, 0.95, 0.8) * spec * 2.4 * uLight;
      col += vec3(1.0,0.9,0.7) * pow(max(dot(R, sunDir), 0.0), 24.0) * 0.12 * uLight;
      col *= max(uLight, 0.08);
      float dist = length(camPos - vWorld);
      float f = 1.0 - exp(-fogDensity*fogDensity*dist*dist);
      col = mix(col, fogColor, f);
      gl_FragColor = vec4(col, 0.93);
    }`
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.set(LAKE.x, WATER_Y, LAKE.z);
scene.add(water);

/* ================= GEOMETRY MERGE HELPER ================= */
function mergeParts(parts){
  let vCount = 0;
  parts.forEach(p => { if (p.geo.index) p.geo = p.geo.toNonIndexed(); vCount += p.geo.attributes.position.count; });
  const pos = new Float32Array(vCount*3), nor = new Float32Array(vCount*3), col = new Float32Array(vCount*3);
  let o = 0;
  const nm = new THREE.Matrix3();
  parts.forEach(p => {
    const g = p.geo, c = p.color;
    const P = g.attributes.position, N = g.attributes.normal;
    nm.getNormalMatrix(p.matrix);
    const v = new THREE.Vector3();
    for(let i=0;i<P.count;i++){
      v.fromBufferAttribute(P,i).applyMatrix4(p.matrix);
      pos[(o+i)*3]=v.x; pos[(o+i)*3+1]=v.y; pos[(o+i)*3+2]=v.z;
      v.fromBufferAttribute(N,i).applyMatrix3(nm).normalize();
      nor[(o+i)*3]=v.x; nor[(o+i)*3+1]=v.y; nor[(o+i)*3+2]=v.z;
      col[(o+i)*3]=c.r; col[(o+i)*3+1]=c.g; col[(o+i)*3+2]=c.b;
    }
    o += P.count;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('normal', new THREE.BufferAttribute(nor,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  return geo;
}
const M = (px,py,pz, sx,sy,sz, ry) => new THREE.Matrix4().compose(
  new THREE.Vector3(px,py,pz),
  new THREE.Quaternion().setFromEuler(new THREE.Euler(0, ry||0, 0)),
  new THREE.Vector3(sx,sy,sz));

/* ================= TREES / ROCKS ================= */
prog(0.38);
const vegMat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.9 });
const pineGeo = mergeParts([
  { geo:new THREE.CylinderGeometry(0.16,0.30,2.4,7),  matrix:M(0,1.2,0,1,1,1),  color:new THREE.Color(0x5a4430) },
  { geo:new THREE.ConeGeometry(1.55,2.6,8),           matrix:M(0,3.0,0,1,1,1),  color:new THREE.Color(0x2c5a2e) },
  { geo:new THREE.ConeGeometry(1.20,2.3,8),           matrix:M(0,4.5,0,1,1,1),  color:new THREE.Color(0x336838) },
  { geo:new THREE.ConeGeometry(0.85,2.0,8),           matrix:M(0,5.9,0,1,1,1),  color:new THREE.Color(0x3c7a40) },
]);
const leafGeo = mergeParts([
  { geo:new THREE.CylinderGeometry(0.22,0.38,2.8,7),  matrix:M(0,1.4,0,1,1,1),        color:new THREE.Color(0x6b4f35) },
  { geo:new THREE.IcosahedronGeometry(1.7,1),         matrix:M(0,3.8,0,1,0.85,1),     color:new THREE.Color(0x4a8a3a) },
  { geo:new THREE.IcosahedronGeometry(1.15,1),        matrix:M(0.9,3.2,0.5,1,0.9,1),  color:new THREE.Color(0x559a42) },
  { geo:new THREE.IcosahedronGeometry(1.0,1),         matrix:M(-0.8,3.4,-0.4,1,0.9,1),color:new THREE.Color(0x3f7c33) },
]);
const bushGeo = mergeParts([
  { geo:new THREE.IcosahedronGeometry(0.7,1), matrix:M(0,0.45,0,1,0.7,1),      color:new THREE.Color(0x3f7a34) },
  { geo:new THREE.IcosahedronGeometry(0.5,1), matrix:M(0.5,0.35,0.2,1,0.75,1), color:new THREE.Color(0x4c8c3c) },
]);
const rockGeo = mergeParts([
  { geo:new THREE.DodecahedronGeometry(1,0), matrix:M(0,0.35,0,1,0.62,1), color:new THREE.Color(0x8a8a86) },
]);

function scatter(geo, count, opts){
  const mesh = new THREE.InstancedMesh(geo, vegMat, count);
  mesh.castShadow = true; mesh.receiveShadow = true;
  const m4 = new THREE.Matrix4(), q = new THREE.Quaternion(), e = new THREE.Euler();
  const p = new THREE.Vector3(), s = new THREE.Vector3(), c = new THREE.Color();
  let placed = 0, tries = 0;
  while(placed < count && tries < count*40){
    tries++;
    const x = (Math.random()-0.5)*WORLD*0.92;
    const z = (Math.random()-0.5)*WORLD*0.92;
    const h = terrainH(x,z);
    if (h < WATER_Y + (opts.minShore||1.0)) continue;
    if (h > (opts.maxH||34)) continue;
    const e2 = 1.6;
    const slope = Math.hypot((terrainH(x+e2,z)-terrainH(x-e2,z))/3.2, (terrainH(x,z+e2)-terrainH(x,z-e2))/3.2);
    if (slope > (opts.maxSlope||0.55)) continue;
    if (opts.density && (fbm(x*0.012+41, z*0.012+17, 3)*0.5+0.5) < opts.density) continue;
    const sc = opts.sMin + Math.random()*(opts.sMax-opts.sMin);
    e.set(0, Math.random()*Math.PI*2, 0);
    q.setFromEuler(e);
    p.set(x, h - 0.12, z);
    s.set(sc, sc*(0.9+Math.random()*0.25), sc);
    m4.compose(p,q,s);
    mesh.setMatrixAt(placed, m4);
    const tcol = 0.85 + Math.random()*0.3;
    mesh.setColorAt(placed, c.setRGB(tcol, tcol, tcol));
    placed++;
  }
  mesh.count = placed;
  mesh.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  scene.add(mesh);
  return mesh;
}
// Denser forest
scatter(pineGeo, 560, { sMin:0.9, sMax:2.2, density:0.36, minShore:1.4 });
scatter(leafGeo, 280, { sMin:0.8, sMax:1.8, density:0.44, minShore:1.6 });
scatter(bushGeo, 320, { sMin:0.7, sMax:1.6, minShore:0.8 });
scatter(rockGeo, 140, { sMin:0.4, sMax:2.4, minShore:0.3, maxSlope:0.9, maxH:60 });

/* ================= GRASS ================= */
prog(0.55);
const GRASS_N = isTouch ? 5200 : 9000;
let grassMat;
{
  const blade = new THREE.BufferGeometry();
  blade.setAttribute('position', new THREE.BufferAttribute(new Float32Array([ -0.06,0,0, 0.06,0,0, 0,1,0 ]),3));
  blade.setAttribute('uv', new THREE.BufferAttribute(new Float32Array([ 0,0, 1,0, 0.5,1 ]),2));
  const inst = new THREE.InstancedBufferGeometry();
  inst.index = blade.index; inst.attributes = blade.attributes;
  const offs = new Float32Array(GRASS_N*3), rots = new Float32Array(GRASS_N), scls = new Float32Array(GRASS_N), tint = new Float32Array(GRASS_N);
  let gI = 0, gT = 0;
  while(gI < GRASS_N && gT < GRASS_N*30){
    gT++;
    const x = (Math.random()-0.5)*WORLD*0.85;
    const z = (Math.random()-0.5)*WORLD*0.85;
    const h = terrainH(x,z);
    if (h < WATER_Y+0.7 || h > 30) continue;
    const e2=1.6;
    const slope = Math.hypot((terrainH(x+e2,z)-terrainH(x-e2,z))/3.2,(terrainH(x,z+e2)-terrainH(x,z-e2))/3.2);
    if (slope > 0.5) continue;
    offs[gI*3]=x; offs[gI*3+1]=h-0.03; offs[gI*3+2]=z;
    rots[gI]=Math.random()*Math.PI*2;
    scls[gI]=0.6+Math.random()*1.1;
    tint[gI]=Math.random();
    gI++;
  }
  inst.instanceCount = gI;
  inst.setAttribute('offset', new THREE.InstancedBufferAttribute(offs,3));
  inst.setAttribute('rot',    new THREE.InstancedBufferAttribute(rots,1));
  inst.setAttribute('scl',    new THREE.InstancedBufferAttribute(scls,1));
  inst.setAttribute('tint',   new THREE.InstancedBufferAttribute(tint,1));
  grassMat = new THREE.ShaderMaterial({
    side:THREE.DoubleSide, fog:false,
    uniforms:{
      time:{value:0}, fogColor:{value:new THREE.Color(0xc8dce8)}, fogDensity:{value:0.0045},
      camPos:{value:new THREE.Vector3()}, uLight:{value:1.0}, uWind:{value:1.0}
    },
    vertexShader:`
      attribute vec3 offset; attribute float rot; attribute float scl; attribute float tint;
      uniform float time; uniform float uWind;
      varying float vT; varying float vTint; varying vec3 vWorld;
      void main(){
        vT = uv.y; vTint = tint;
        float c = cos(rot), s = sin(rot);
        vec3 p = position * vec3(1.0, scl, 1.0);
        p = vec3(p.x*c - p.z*s, p.y, p.x*s + p.z*c);
        float sway = sin(time*(1.8+uWind) + offset.x*0.6 + offset.z*0.4) * (0.14*uWind) * uv.y * uv.y;
        p.x += sway; p.z += sway*0.6;
        vec3 w = p + offset;
        vWorld = w;
        gl_Position = projectionMatrix * viewMatrix * vec4(w, 1.0);
      }`,
    fragmentShader:`
      varying float vT; varying float vTint; varying vec3 vWorld;
      uniform vec3 fogColor; uniform float fogDensity; uniform vec3 camPos; uniform float uLight;
      void main(){
        vec3 base = mix(vec3(0.16,0.32,0.12), vec3(0.19,0.38,0.14), vTint);
        vec3 tip  = mix(vec3(0.45,0.68,0.28), vec3(0.55,0.78,0.32), vTint);
        vec3 col = mix(base, tip, vT) * max(uLight, 0.07);
        float dist = length(camPos - vWorld);
        float f = 1.0 - exp(-fogDensity*fogDensity*dist*dist);
        col = mix(col, fogColor, f);
        gl_FragColor = vec4(col, 1.0);
      }`
  });
  const grass = new THREE.Mesh(inst, grassMat);
  grass.frustumCulled = false;
  scene.add(grass);
}

let actx = null;
function ensureAudio(){
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
addEventListener('pointerdown', ensureAudio, { once:false });
addEventListener('touchstart', ensureAudio, { once:false });
function playThunder(delay){
  if (!actx) return;
  const t0 = actx.currentTime + delay;
  const dur = 2.5 + Math.random()*2;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t = i/d.length;
    d[i] = (Math.random()*2-1) * Math.pow(1-t, 2.2) * (0.6 + 0.4*Math.sin(t*30));
  }
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 220 + Math.random()*160;
  const g = actx.createGain(); g.gain.value = 0.5;
  src.connect(lp); lp.connect(g); g.connect(actx.destination);
  src.start(t0);
}

/* ================= MAIN LOOP ================= */
const clock = new THREE.Clock();
let bobT = 0, shake = 0, flash = 0, dayT = 0.32;   // start mid-morning
const DAY_LEN = 300;                                // seconds per full cycle
const colDayZen = new THREE.Color(0.22,0.45,0.78), colDayHor = new THREE.Color(0.86,0.90,0.94);
const colSetZen = new THREE.Color(0.28,0.22,0.42), colSetHor = new THREE.Color(0.98,0.55,0.30);
const colNigZen = new THREE.Color(0.015,0.025,0.06), colNigHor = new THREE.Color(0.05,0.07,0.12);
const tmpA = new THREE.Color(), tmpB = new THREE.Color(), fogCol = new THREE.Color();
const moonCol = new THREE.Color(0x93a7cc), dayCol = new THREE.Color(0xfff2dd), setCol = new THREE.Color(0xffa658);

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  /* ---- day/night ---- */
  dayT = (dayT + dt/DAY_LEN) % 1;
  const ang = dayT * Math.PI * 2;
  const el = Math.sin(ang);                                   // sun elevation -1..1
  SUN_DIR.set(Math.cos(ang), el, 0.35).normalize();
  const dl = THREE.MathUtils.smoothstep(el, -0.08, 0.22);     // daylight 0..1
  const nightF = 1 - THREE.MathUtils.smoothstep(el, -0.18, 0.05);
  const sunsetF = Math.max(0, 1 - Math.abs(el)*4) * (dl > 0.02 ? 1 : 0);

  // clock display
  const hrs = ((dayT*24)+0)%24;
  document.getElementById('wTime').textContent =
    String(Math.floor(hrs)).padStart(2,'0') + ':' + String(Math.floor((hrs%1)*60)).padStart(2,'0');

  /* ---- weather scheduling ---- */
  weatherTimer -= dt;
  if (weatherTimer <= 0) rollWeather();
  const W = WEATHERS[curWeather];
  const k = 1 - Math.exp(-dt*0.8);       // smooth transition
  env.fogD += (W.fogD - env.fogD)*k;
  env.dim  += (W.dim  - env.dim )*k;
  env.cloud+= (W.cloud- env.cloud)*k;
  env.rain += (W.rain - env.rain)*k;
  env.snow += (W.snow - env.snow)*k;
  env.storm+= (W.storm- env.storm)*k;
  env.wind += (W.wind - env.wind)*k;
  env.fogTint.lerp(W.fogTint, k);

  /* ---- sky & fog colors ---- */
  tmpA.copy(colNigZen).lerp(colDayZen, dl);
  tmpB.copy(colNigHor).lerp(colDayHor, dl);
  tmpA.lerp(colSetZen, sunsetF*0.7);
  tmpB.lerp(colSetHor, sunsetF*0.85);
  // storms darken the sky
  tmpA.multiplyScalar(1 - env.storm*0.55*dl);
  tmpB.multiplyScalar(1 - env.storm*0.45*dl);
  skyMat.uniforms.uZen.value.copy(tmpA);
  skyMat.uniforms.uHor.value.copy(tmpB);
  skyMat.uniforms.uNight.value = nightF;
  skyMat.uniforms.uStorm.value = Math.max(env.storm, env.cloud-0.6);
  skyMat.uniforms.time.value = t;
  skyMat.uniforms.uSunCol.value.copy(dayCol).lerp(setCol, sunsetF);

  fogCol.copy(tmpB).multiply(env.fogTint);
  scene.fog.color.copy(fogCol);
  scene.fog.density = env.fogD;

  /* ---- lights ---- */
  const dim = env.dim;
  if (el > -0.02){
    sun.position.copy(player.pos).addScaledVector(SUN_DIR, 180);
    sun.color.copy(dayCol).lerp(setCol, sunsetF);
    sun.intensity = 2.1 * dl * dim;
  } else {
    sun.position.copy(player.pos).addScaledVector(SUN_DIR, -180); // moon
    sun.color.copy(moonCol);
    sun.intensity = 0.33 * nightF * Math.max(dim, 0.5);
  }
  sun.target.position.copy(player.pos);
  hemi.intensity = (0.12 + 0.75*dl) * (0.45 + 0.55*dim) + flash*2.2;
  hemi.color.copy(tmpB);
  hemi.groundColor.setRGB(0.29*dl+0.02, 0.42*dl+0.03, 0.23*dl+0.04);
  renderer.toneMappingExposure = 1.15;

  /* ---- lightning ---- */
  flash *= Math.exp(-dt*7);
  if (env.storm > 0.5 && Math.random() < dt*0.22){
    flash = 0.7 + Math.random()*0.5;
    playThunder(0.4 + Math.random()*1.8);
  }
  skyMat.uniforms.uFlash.value = flash;

  /* ---- movement ---- */
  let mx = 0, mz = 0;
  if (keys['KeyW']||keys['ArrowUp']) mz -= 1;
  if (keys['KeyS']||keys['ArrowDown']) mz += 1;
  if (keys['KeyA']||keys['ArrowLeft']) mx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) mx += 1;
  mx += joyVec.x; mz += joyVec.y;
  const mlen = Math.hypot(mx,mz);
  if (mlen > 1){ mx/=mlen; mz/=mlen; }
  const speed = (player.sprint ? 13.5 : 6.5);
  const fwdX = -Math.sin(player.yaw), fwdZ = -Math.cos(player.yaw);
  const rgtX = Math.cos(player.yaw), rgtZ = -Math.sin(player.yaw);
  let nx = player.pos.x + (rgtX*mx + fwdX*(-mz)) * speed * dt;
  let nz = player.pos.z + (rgtZ*mx + fwdZ*(-mz)) * speed * dt;

  /* ---- tornado behavior ---- */
  if (tornado.active) tornado.fade = Math.min(1, tornado.fade + dt*0.5);
  else tornado.fade = Math.max(0, tornado.fade - dt*0.5);
  if (tornado.fade > 0.001){
    tornado.group.visible = true;
    // wander, loosely stalking the player
    tornado.ang += dt*0.25;
    const toP = Math.atan2(player.pos.x - tornado.pos.x, player.pos.z - tornado.pos.z);
    const wander = toP + Math.sin(tornado.ang*1.7)*1.4;
    const tSpeed = 9;
    tornado.pos.x += Math.sin(wander)*tSpeed*dt;
    tornado.pos.z += Math.cos(wander)*tSpeed*dt;
    const ty = Math.max(terrainH(tornado.pos.x, tornado.pos.z), WATER_Y);
    tornado.group.position.set(tornado.pos.x, ty-1, tornado.pos.z);
    tornado.group.rotation.y += dt*4.5;
    tornado.funMat.uniforms.time.value = t;
    tornado.funMat.uniforms.uOp.value = tornado.fade;
    tornado.dust.material.opacity = tornado.fade*0.8;
    // dust swirl
    const dp = tornado.dustGeo.attributes.position;
    for(let i=0;i<tornado.dustSeed.length;i++){
      const s = tornado.dustSeed[i];
      s.a += s.v*dt;
      dp.setXYZ(i, Math.cos(s.a)*s.r, s.y + Math.sin(s.a*0.5)*1.2, Math.sin(s.a)*s.r);
    }
    dp.needsUpdate = true;
    // effect on player
    const dxp = player.pos.x - tornado.pos.x, dzp = player.pos.z - tornado.pos.z;
    const distT = Math.hypot(dxp, dzp);
    shake = Math.max(shake, THREE.MathUtils.clamp(1 - distT/90, 0, 1)*0.5);
    if (distT < 30){
      // pulled and spun
      const pull = (1 - distT/30) * 26 * dt;
      const tang = Math.atan2(dzp, dxp) + Math.PI/2;
      nx += Math.cos(tang)*pull*2.2 - (dxp/Math.max(distT,1))*pull;
      nz += Math.sin(tang)*pull*2.2 - (dzp/Math.max(distT,1))*pull;
    }
  } else {
    tornado.group.visible = false;
  }
  shake *= Math.exp(-dt*2.5);

  /* ---- apply movement ---- */
  const lim = WORLD*0.47;
  nx = THREE.MathUtils.clamp(nx, -lim, lim);
  nz = THREE.MathUtils.clamp(nz, -lim, lim);
  const groundY = terrainH(nx, nz);
  if (groundY > WATER_Y - 0.9){ player.pos.x = nx; player.pos.z = nz; }
  const gy = terrainH(player.pos.x, player.pos.z);
  const eye = Math.max(gy, WATER_Y - 0.4) + 1.75;
  player.pos.y += (eye - player.pos.y) * Math.min(1, dt*10);

  const moving = mlen > 0.05;
  if (moving) bobT += dt * (player.sprint ? 11 : 7);
  const bob = moving ? Math.sin(bobT)*0.05 : 0;
  const shX = (Math.random()-0.5)*shake*0.3, shY = (Math.random()-0.5)*shake*0.3;

  camera.position.set(player.pos.x + shX, player.pos.y + bob + shY, player.pos.z);
  camera.rotation.set(0,0,0);
  camera.rotateY(player.yaw);
  camera.rotateX(player.pitch);

  /* ---- water & grass uniforms ---- */
  const lightF = Math.max(0.06, dl) * (0.35 + 0.65*dim);
  waterMat.uniforms.time.value = t;
  waterMat.uniforms.camPos.value.copy(camera.position);
  waterMat.uniforms.fogColor.value.copy(fogCol);
  waterMat.uniforms.fogDensity.value = env.fogD;
  waterMat.uniforms.uLight.value = lightF;
  grassMat.uniforms.time.value = t;
  grassMat.uniforms.camPos.value.copy(camera.position);
  grassMat.uniforms.fogColor.value.copy(fogCol);
  grassMat.uniforms.fogDensity.value = env.fogD;
  grassMat.uniforms.uLight.value = lightF;
  grassMat.uniforms.uWind.value = env.wind;

  /* ---- clouds ---- */
  const cloudBright = 0.15 + 0.85*dl;
  for(const c of clouds){
    c.position.x += c.userData.v * dt * env.wind;
    if (c.position.x > 750) c.position.x = -750;
    c.material.opacity = Math.min(1, c.userData.baseOp * env.cloud);
    const b = cloudBright * (1 - env.storm*0.6);
    c.material.color.setRGB(b, b, b*1.02);
  }

  /* ---- pollen (only in calm daylight) ---- */
  partPts.material.opacity = 0.65 * dl * Math.max(0, 1 - env.rain - env.snow - env.storm);
  const pp = partGeo.attributes.position;
  for(let i=0;i<PART_N;i++){
    let px = pp.getX(i), py = pp.getY(i);
    py += Math.sin(t*0.7 + i)*0.004 + 0.008;
    px += Math.sin(t*0.35 + i*1.3)*0.01;
    if (py > 16) py = 0.5;
    pp.setXYZ(i, px, py, pp.getZ(i));
  }
  pp.needsUpdate = true;
  partPts.position.set(Math.round(player.pos.x/60)*60, 0, Math.round(player.pos.z/60)*60);

  /* ---- rain ---- */
  rainMat.opacity = env.rain > 0.02 ? Math.min(0.55, env.rain*0.5) : 0;
  if (rainMat.opacity > 0){
    const rp = rainGeo.attributes.position;
    const windX = env.wind*1.5;
    for(let i=0;i<RAIN_N;i++){
      const s = rainSeed[i];
      s.y -= (42*s.s + env.rain*14) * dt;
      s.x += windX*dt*3;
      if (s.y < 0){ s.y = 34 + Math.random()*4; s.x = (Math.random()-0.5)*70; s.z = (Math.random()-0.5)*70; }
      const bx = camera.position.x + s.x, by = camera.position.y - 8 + s.y, bz = camera.position.z + s.z;
      rp.setXYZ(i*2, bx, by, bz);
      rp.setXYZ(i*2+1, bx - windX*0.06, by + 0.7*s.s, bz);
    }
    rp.needsUpdate = true;
  }

  /* ---- snow ---- */
  snowMat.opacity = env.snow > 0.02 ? Math.min(0.9, env.snow) : 0;
  if (snowMat.opacity > 0){
    const sp2 = snowGeo.attributes.position;
    for(let i=0;i<SNOW_N;i++){
      const s = snowSeed[i];
      s.y -= (2.6*s.s) * dt;
      s.x += Math.sin(t*0.8 + s.ph)*0.6*dt*env.wind;
      s.z += Math.cos(t*0.6 + s.ph)*0.5*dt*env.wind;
      if (s.y < 0){ s.y = 32 + Math.random()*3; s.x = (Math.random()-0.5)*80; s.z = (Math.random()-0.5)*80; }
      sp2.setXYZ(i, camera.position.x + s.x, camera.position.y - 8 + s.y, camera.position.z + s.z);
    }
    sp2.needsUpdate = true;
  }

  renderer.render(scene, camera);
}
animate();
})();
</script>
</body>
</html>
