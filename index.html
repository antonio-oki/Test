<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android 1.0 Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span id="time">12:00</span>
            <span id="wifi-indicator"></span>
            <span>100%</span>
        </div>
        
        <div id="desktop" class="screen">
            <div class="icon" onclick="openApp('Browser')">🌐<br>Browser</div>
            <div class="icon" onclick="openApp('Settings')">⚙️<br>Settings</div>
            <div class="icon" onclick="openApp('Messages')">✉️<br>Messages</div>
            <div class="icon" onclick="openApp('Files')">📁<br>Files</div>
        </div>

        <div id="app-window" class="screen hidden">
            <div id="app-content"></div>
        </div>

        <div class="dock">
            <div class="dock-icon" onclick="goHome()">🏠</div>
            <div class="dock-icon" onclick="openApp('Browser')">🌐</div>
            <div class="dock-icon" onclick="openApp('Messages')">✉️</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
