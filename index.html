<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macintosh System 1 Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT -->
<div id="boot">
    <div id="bootText">Macintosh</div>
</div>

<!-- MENU BAR -->
<div id="menuBar">
    <div class="menuItem" data-menu="apple"></div>
    <div class="menuItem" data-menu="file">File</div>
    <div class="menuItem" data-menu="edit">Edit</div>
    <div class="menuItem" data-menu="special">Special</div>
</div>

<!-- MENUS -->
<div class="menuDrop" id="fileMenu">
    <div>New Folder</div>
    <div>Close</div>
</div>

<div class="menuDrop" id="specialMenu">
    <div>Empty Trash</div>
    <div>Restart</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

    <div class="icon" data-app="finder">💾 Macintosh HD</div>
    <div class="icon" data-app="write">📄 Write</div>
    <div class="icon" data-app="calc">🧮 Calculator</div>

    <div id="trash">🗑 Trash</div>

    <!-- WINDOWS -->
    <div class="window" id="writeWin">
        <div class="title">Write</div>
        <textarea>Welcome to Macintosh</textarea>
    </div>

    <div class="window" id="calcWin">
        <div class="title">Calculator</div>
        <input id="calcInput">
        <div id="calcOut"></div>
    </div>

    <!-- ALERT -->
    <div id="alert">
        <div id="alertBox">
            <div id="alertText">Error</div>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
