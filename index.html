<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CLAWD // NOW CLIMBING</title>
<style>
  @font-face {
    font-family: 'PressStart';
    src: local('Press Start 2P');
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #0a0a0c;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  #stage {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  #frame {
    position: relative;
    width: min(100vw, 480px);
    height: 100dvh;
    max-height: 800px;
    background: #101014;
    overflow: hidden;
    box-shadow: 0 0 0 1px #2a2a30, 0 20px 60px rgba(0,0,0,0.8);
  }
  /* scanline / dot texture like reference image */
  #frame::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 50;
    mix-blend-mode: overlay;
  }
  #frame::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.12) 3px
    );
    pointer-events: none;
    z-index: 51;
  }

  #canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 14px 0 14px;
    pointer-events: none;
  }
  .marquee {
    border: 2px solid #E8A585;
    border-radius: 6px;
    padding: 6px 10px;
    background: rgba(10,10,12,0.7);
    box-shadow: 0 0 12px rgba(232,165,133,0.25), inset 0 0 8px rgba(232,165,133,0.08);
  }
  .marquee-label {
    font-family: 'PressStart', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: #6b6b72;
    margin-bottom: 4px;
  }
  .marquee-value {
    font-family: 'PressStart', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    color: #E8A585;
    text-shadow: 0 0 8px rgba(232,165,133,0.6);
  }
  #lives { display: flex; gap: 4px; margin-top: 2px; }
  .heart { width: 12px; height: 12px; background: #E8A585; clip-path: polygon(50% 15%, 61% 5%, 75% 5%, 88% 18%, 88% 32%, 50% 70%, 12% 32%, 12% 18%, 25% 5%, 39% 5%); filter: drop-shadow(0 0 4px rgba(232,165,133,0.5)); transition: opacity 0.3s, transform 0.3s;}
  .heart.lost { opacity: 0.15; transform: scale(0.7); filter: none; }

  /* Title screen */
  #titleScreen, #overScreen {
    position: absolute; inset: 0;
    z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #17171b 0%, #0a0a0c 75%);
    text-align: center;
    padding: 20px;
  }
  .now-showing {
    font-family: 'PressStart', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #6b6b72;
    border: 2px dashed #3a3a42;
    border-radius: 40px;
    padding: 10px 22px;
    margin-bottom: 18px;
  }
  .title-box {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }
  .title-letter {
    font-family: 'PressStart', monospace;
    font-size: clamp(22px, 8vw, 34px);
    color: #E8A585;
    background: #16161a;
    border: 2px solid #2a2a30;
    border-radius: 4px;
    padding: 10px 6px;
    text-shadow: 0 0 10px rgba(232,165,133,0.7);
    animation: flicker 3.4s infinite;
  }
  .title-letter:nth-child(2) { animation-delay: 0.2s; }
  .title-letter:nth-child(3) { animation-delay: 0.4s; }
  .title-letter:nth-child(4) { animation-delay: 0.1s; }
  .title-letter:nth-child(5) { animation-delay: 0.5s; }
  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.4; }
    98% { opacity: 1; }
  }
  #clawdHero {
    width: 90px; height: 90px;
    margin-bottom: 22px;
    animation: bob 1.6s ease-in-out infinite;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6));
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .sub {
    font-family: 'PressStart', monospace;
    font-size: 9px;
    color: #8a8a92;
    letter-spacing: 1px;
    line-height: 1.9;
    margin-bottom: 26px;
    max-width: 320px;
  }
  .sub b { color: #E8A585; }
  #startBtn, #retryBtn {
    font-family: 'PressStart', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: #0a0a0c;
    background: #E8A585;
    border: none;
    border-radius: 6px;
    padding: 14px 30px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(232,165,133,0.4);
    transition: transform 0.15s ease;
  }
  #startBtn:active, #retryBtn:active { transform: scale(0.94); }
  #overScreen { display: none; }
  #overTitle {
    font-family: 'PressStart', monospace;
    font-size: 20px;
    color: #E8A585;
    margin-bottom: 14px;
    text-shadow: 0 0 10px rgba(232,165,133,0.6);
  }
  #overScore {
    font-family: 'PressStart', monospace;
    font-size: 10px;
    color: #8a8a92;
    margin-bottom: 30px;
    line-height: 2;
  }
  #overScore b { color: #E8A585; font-size: 14px; }

  /* Touch controls */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 16px 22px 16px;
    pointer-events: none;
  }
  .ctrl-group { display: flex; gap: 10px; pointer-events: auto; }
  .ctrl-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(232,165,133,0.1);
    border: 2px solid rgba(232,165,133,0.5);
    color: #E8A585;
    font-family: 'PressStart', monospace;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    transition: background 0.1s, transform 0.1s;
  }
  .ctrl-btn.pressed {
    background: rgba(232,165,133,0.4);
    transform: scale(0.92);
  }
  #jumpBtn {
    width: 68px; height: 68px;
    font-size: 10px;
  }
  .hidden-desktop { display: none; }
  @media (hover: none) and (pointer: coarse) {
    .hidden-desktop { display: flex; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <canvas id="canvas"></canvas>

    <div id="hud">
      <div class="marquee">
        <div class="marquee-label">SCORE</div>
        <div class="marquee-value" id="scoreVal">0000</div>
      </div>
      <div class="marquee">
        <div class="marquee-label">LIVES</div>
        <div id="lives">
          <div class="heart" data-i="0"></div>
          <div class="heart" data-i="1"></div>
          <div class="heart" data-i="2"></div>
        </div>
      </div>
    </div>

    <div id="titleScreen">
      <div class="now-showing">NOW SHOWING</div>
      <div class="title-box">
        <div class="title-letter">C</div>
        <div class="title-letter">L</div>
        <div class="title-letter">A</div>
        <div class="title-letter">W</div>
        <div class="title-letter">D</div>
      </div>
      <svg id="clawdHero" viewBox="0 0 40 40"><g id="heroSvg"></g></svg>
      <div class="sub">CLIMB THE TOWER.<br>GRAB THE <b>GLOW ORBS</b>.<br>DODGE THE <b>STATIC</b>.</div>
      <button id="startBtn">▶ START</button>
    </div>

    <div id="overScreen">
      <div id="overTitle">SIGNAL LOST</div>
      <div id="overScore">FINAL SCORE<br><b id="finalScoreVal">0</b></div>
      <button id="retryBtn">↻ RETRY</button>
    </div>

    <div id="controls">
      <div class="ctrl-group hidden-desktop">
        <div class="ctrl-btn" id="leftBtn">◀</div>
        <div class="ctrl-btn" id="rightBtn">▶</div>
      </div>
      <div class="ctrl-group hidden-desktop">
        <div class="ctrl-btn" id="jumpBtn">JUMP</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const frame = document.getElementById('frame');

  let W, H, DPR;
  function resize(){
    const rect = frame.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Clawd pixel-art drawer (matches reference: pink squid-cat, ear notches, dark eyes, 4 legs) ----------
  function drawClawd(c, x, y, size, facing, walkPhase, squash){
    c.save();
    c.translate(x, y);
    c.scale(facing, 1);
    const s = size / 10; // unit
    squash = squash || 1;
    c.scale(1/squash, squash);

    c.fillStyle = '#E8A585';
    // ears
    c.fillRect(-3*s, -5*s, 2*s, 2*s);
    c.fillRect(1*s, -5*s, 2*s, 2*s);
    // head/body block
    c.fillRect(-3*s, -3*s, 6*s, 6*s);
    // legs (4), animated
    const legOffsets = [
      Math.sin(walkPhase) * 0.6,
      Math.sin(walkPhase + Math.PI) * 0.6,
      Math.sin(walkPhase + Math.PI) * 0.6,
      Math.sin(walkPhase) * 0.6
    ];
    const legX = [-3, -1, 1, 2.4];
    for(let i=0;i<4;i++){
      c.fillRect(legX[i]*s, (3+legOffsets[i]*0.4)*s, 0.8*s, 2.2*s);
    }
    // eyes
    c.fillStyle = '#1a1210';
    c.fillRect(-1.6*s, -1.2*s, 1.1*s, 1.1*s);
    c.fillRect(0.7*s, -1.2*s, 1.1*s, 1.1*s);
    c.restore();
  }

  // ---------- Game constants ----------
  const GRAVITY = 0.62;
  const MOVE_SPEED = 2.6;
  const JUMP_VEL = -11.5;
  const PLATFORM_H = 10;

  let state = 'title'; // title | playing | over
  let score = 0;
  let lives = 3;
  let camY = 0;
  let particles = [];
  let orbs = [];
  let hazards = [];
  let platforms = [];
  let player, keys, touchLeft=false, touchRight=false, touchJumpQueued=false;
  let walkPhase = 0;
  let squash = 1;
  let towerTopY = 0; // world y of topmost platform (goal-less endless climb)
  let bestHeightScore = 0;
  let shakeT = 0;

  function rand(a,b){ return a + Math.random()*(b-a); }

  function buildInitialPlatforms(){
    platforms = [];
    orbs = [];
    hazards = [];
    // ground platform
    platforms.push({x:0, y:H-40, w:W, kind:'ground'});
    let y = H - 40;
    for(let i=0;i<40;i++){
      y -= rand(58,78);
      const w = rand(70,120);
      const x = rand(10, Math.max(10,W-w-10));
      platforms.push({x,y,w,kind:'normal'});
      if(Math.random() < 0.55){
        orbs.push({x: x + w/2, y: y-16, r:6, taken:false, phase: Math.random()*Math.PI*2});
      }
      if(i>3 && Math.random() < 0.28){
        hazards.push({x: x + rand(0,w-14), y: y-30, w:14, h:14, phase: Math.random()*Math.PI*2, speed: rand(0.6,1.4), range: rand(20,50), baseX: x + rand(0,Math.max(1,w-14))});
      }
    }
    towerTopY = y;
  }

  function resetGame(){
    score = 0; lives = 3; camY = 0; shakeT = 0;
    buildInitialPlatforms();
    player = {
      x: W/2, y: H-70, vx:0, vy:0, w:16, h:18,
      onGround:false, facing:1, invuln:0
    };
    updateHud();
  }

  function updateHud(){
    document.getElementById('scoreVal').textContent = String(score).padStart(4,'0');
    document.querySelectorAll('.heart').forEach((h,i)=>{
      h.classList.toggle('lost', i >= lives);
    });
  }

  // ---------- Input ----------
  keys = {left:false, right:false};
  window.addEventListener('keydown', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left = true;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right = true;
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ touchJumpQueued = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left = false;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right = false;
  });

  function bindHold(el, onDown, onUp){
    const down = (e)=>{ e.preventDefault(); el.classList.add('pressed'); onDown(); };
    const up = (e)=>{ e.preventDefault(); el.classList.remove('pressed'); onUp(); };
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('touchend', up, {passive:false});
    el.addEventListener('touchcancel', up, {passive:false});
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }
  bindHold(document.getElementById('leftBtn'), ()=>touchLeft=true, ()=>touchLeft=false);
  bindHold(document.getElementById('rightBtn'), ()=>touchRight=true, ()=>touchRight=false);
  bindHold(document.getElementById('jumpBtn'), ()=>touchJumpQueued=true, ()=>{});

  // ---------- Screens ----------
  document.getElementById('startBtn').addEventListener('click', ()=>{
    document.getElementById('titleScreen').style.display = 'none';
    resetGame();
    state = 'playing';
  });
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    document.getElementById('overScreen').style.display = 'none';
    resetGame();
    state = 'playing';
  });

  // draw hero preview on title screen
  (function(){
    const svgNS = "http://www.w3.org/2000/svg";
    const heroSvg = document.getElementById('heroSvg');
    // We'll just reuse canvas-style draw via a tiny offscreen canvas turned into image for simplicity:
  })();
  // Simpler: render title hero with a mini canvas overlay
  const heroCanvas = document.createElement('canvas');
  heroCanvas.width = 90; heroCanvas.height = 90;
  heroCanvas.style.position='absolute';
  const heroWrap = document.getElementById('clawdHero');
  heroWrap.replaceWith(heroCanvas);
  heroCanvas.id = 'clawdHero';
  const heroCtx = heroCanvas.getContext('2d');
  let heroPhase = 0;
  function drawHeroPreview(){
    heroCtx.clearRect(0,0,90,90);
    heroPhase += 0.09;
    drawClawd(heroCtx, 45, 55, 46, 1, heroPhase, 1 + Math.sin(heroPhase*0.5)*0.03);
    requestAnimationFrame(drawHeroPreview);
  }
  drawHeroPreview();

  // ---------- Particles ----------
  function spawnBurst(x,y,color,n){
    for(let i=0;i<n;i++){
      particles.push({
        x,y, vx: rand(-2.5,2.5), vy: rand(-3.5,-0.5),
        life: 1, color, size: rand(2,4)
      });
    }
  }

  // ---------- Update ----------
  function update(){
    if(state !== 'playing') return;

    // horizontal movement
    let moveDir = 0;
    if(keys.left || touchLeft) moveDir -= 1;
    if(keys.right || touchRight) moveDir += 1;
    player.vx = moveDir * MOVE_SPEED;
    if(moveDir !== 0) player.facing = moveDir > 0 ? 1 : -1;

    if(moveDir !== 0 && player.onGround){
      walkPhase += 0.28;
    }

    if(touchJumpQueued){
      if(player.onGround){
        player.vy = JUMP_VEL;
        player.onGround = false;
        squash = 1.3;
        spawnBurst(player.x, player.y+8, '#E8A585', 6);
      }
      touchJumpQueued = false;
    }

    player.vy += GRAVITY;
    if(player.vy > 14) player.vy = 14;

    player.x += player.vx;
    player.y += player.vy;

    // wrap horizontally softly (walls)
    if(player.x < 12) player.x = 12;
    if(player.x > W-12) player.x = W-12;

    // platform collision (only when falling)
    player.onGround = false;
    if(player.vy >= 0){
      for(const p of platforms){
        const px = p.x, pw = p.w, py = p.y;
        if(player.x+6 > px && player.x-6 < px+pw){
          const prevBottom = player.y - player.vy + player.h/2;
          const currBottom = player.y + player.h/2;
          if(prevBottom <= py && currBottom >= py){
            player.y = py - player.h/2;
            player.vy = 0;
            player.onGround = true;
            squash = 0.78;
          }
        }
      }
    }
    squash += (1-squash)*0.2;

    // camera follow (only scrolls up)
    const targetCam = Math.max(0, (H*0.42) - player.y);
    if(targetCam > camY){
      const dy = targetCam - camY;
      camY = targetCam;
      // score by height climbed
      const gained = Math.round(dy/2);
      if(gained>0){ score += gained; updateHud(); }
    }

    // fell off bottom of view -> lose life
    if(player.y - camY > H + 60){
      loseLife();
    }

    // orb collection
    for(const o of orbs){
      if(o.taken) continue;
      o.phase += 0.08;
      const dx = player.x - o.x, dy = (player.y) - o.y;
      if(Math.sqrt(dx*dx+dy*dy) < 18){
        o.taken = true;
        score += 50;
        updateHud();
        spawnBurst(o.x,o.y,'#E8A585',10);
      }
    }

    // hazards (drifting static blocks)
    for(const hz of hazards){
      hz.phase += 0.03*hz.speed;
      hz.x = hz.baseX + Math.sin(hz.phase)*hz.range;
      const dx = Math.abs(player.x - (hz.x+hz.w/2));
      const dy = Math.abs(player.y - (hz.y+hz.h/2));
      if(dx < 12 && dy < 13 && player.invuln<=0){
        loseLife();
      }
    }

    if(player.invuln>0) player.invuln--;

    // extend tower upward as needed
    while(towerTopY > player.y - camY - H){
      towerTopY -= rand(58,78);
      const w = rand(70,120);
      const x = rand(10, Math.max(10,W-w-10));
      platforms.push({x,y:towerTopY,w,kind:'normal'});
      if(Math.random() < 0.55){
        orbs.push({x: x + w/2, y: towerTopY-16, r:6, taken:false, phase: Math.random()*Math.PI*2});
      }
      if(Math.random() < 0.3){
        hazards.push({x, y: towerTopY-30, w:14, h:14, phase: Math.random()*Math.PI*2, speed: rand(0.6,1.4), range: rand(20,50), baseX: x});
      }
    }
    // cull old platforms/orbs/hazards far below
    const cullY = player.y - camY + H*1.5 + 200;
    platforms = platforms.filter(p => p.y < cullY || p.kind==='ground');
    orbs = orbs.filter(o => o.y < cullY);
    hazards = hazards.filter(h => h.y < cullY);

    // particles
    for(const pt of particles){
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life -= 0.03;
    }
    particles = particles.filter(p=>p.life>0);

    if(shakeT>0) shakeT--;
  }

  function loseLife(){
    lives--;
    updateHud();
    shakeT = 14;
    spawnBurst(player.x, player.y, '#ff6b6b', 14);
    if(lives <= 0){
      state = 'over';
      document.getElementById('finalScoreVal').textContent = score;
      document.getElementById('overScreen').style.display = 'flex';
      return;
    }
    // respawn on nearest platform below current cam view
    player.x = W/2;
    player.y = (camY) + H*0.5;
    player.vy = 0;
    player.invuln = 60;
  }

  // ---------- Draw ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    // background gradient
    const g = ctx.createRadialGradient(W/2, H*0.25, 10, W/2, H*0.5, H*0.9);
    g.addColorStop(0, '#1c1c22');
    g.addColorStop(1, '#0a0a0c');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    let shakeX = 0, shakeY = 0;
    if(shakeT>0){
      shakeX = rand(-4,4); shakeY = rand(-4,4);
    }
    ctx.translate(shakeX, camY + shakeY);

    // ladder/tower rails motif behind platforms (subtle)
    ctx.strokeStyle = 'rgba(90,90,100,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W*0.15, H); ctx.lineTo(W*0.35, -camY - H);
    ctx.moveTo(W*0.85, H); ctx.lineTo(W*0.65, -camY - H);
    ctx.stroke();

    // platforms
    for(const p of platforms){
      const isGround = p.kind==='ground';
      ctx.fillStyle = isGround ? '#2a2a30' : '#3a3a42';
      ctx.fillRect(p.x, p.y, p.w, isGround ? 40 : 8);
      ctx.fillStyle = 'rgba(232,165,133,0.35)';
      ctx.fillRect(p.x, p.y, p.w, 2);
    }

    // orbs
    for(const o of orbs){
      if(o.taken) continue;
      const bob = Math.sin(o.phase)*3;
      ctx.save();
      ctx.translate(o.x, o.y+bob);
      const glow = ctx.createRadialGradient(0,0,0,0,0,16);
      glow.addColorStop(0,'rgba(232,165,133,0.9)');
      glow.addColorStop(1,'rgba(232,165,133,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(-16,-16,32,32);
      ctx.fillStyle = '#E8A585';
      ctx.beginPath();
      ctx.arc(0,0,5,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // hazards (glitchy static blocks)
    for(const hz of hazards){
      ctx.save();
      const flick = Math.random() < 0.15;
      ctx.fillStyle = flick ? '#ff9b9b' : '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 8;
      ctx.fillRect(hz.x, hz.y, hz.w, hz.h);
      ctx.restore();
    }

    // particles
    for(const pt of particles){
      ctx.globalAlpha = Math.max(pt.life,0);
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x-pt.size/2, pt.y-pt.size/2, pt.size, pt.size);
      ctx.globalAlpha = 1;
    }

    // player
    if(state === 'playing'){
      if(player.invuln>0 && Math.floor(player.invuln/4)%2===0){
        // blink while invulnerable
      } else {
        drawClawd(ctx, player.x, player.y, 34, player.facing, walkPhase, squash);
      }
    }

    ctx.restore();
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
