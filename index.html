<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FABLE 5 — Climb</title>
<style>
  :root{
    --bg0:#0a0a0f;
    --bg1:#14141c;
    --dot:#26262f;
    --amber:#ff6b5e;
    --amber-glow:#ff9d8c;
    --creature:#e8a17e;
    --creature-dark:#c9835f;
    --ladder:#2e2e38;
    --ladder-light:#3c3c48;
    --orb:#7cf7d0;
    --orb-glow:#a6ffe6;
    --panel:#0e0e15;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--bg0);
    font-family:'Courier New', monospace;
    touch-action:none;
  }
  #stage{
    position:relative;
    width:100%;
    height:100dvh;
    background:
      radial-gradient(ellipse at 50% 20%, #1a1a24 0%, var(--bg0) 60%);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #frame{
    position:relative;
    width:min(420px, 100vw);
    height:100dvh;
    max-height:820px;
    overflow:hidden;
    background:var(--bg0);
    box-shadow:0 0 0 1px #000;
  }
  /* dotted background texture */
  .dots{
    position:absolute; inset:0;
    background-image:radial-gradient(var(--dot) 1px, transparent 1px);
    background-size:6px 6px;
    opacity:.5;
    pointer-events:none;
  }
  /* HUD */
  #hud{
    position:absolute; top:0; left:0; right:0;
    padding:14px 14px 0 14px;
    z-index:20;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
  }
  #marquee{
    border:2px solid var(--amber);
    border-radius:20px;
    padding:6px 16px;
    background:rgba(10,10,15,.85);
    box-shadow:0 0 12px rgba(255,107,94,.35), inset 0 0 8px rgba(255,107,94,.15);
  }
  #marquee .now{
    font-size:9px; letter-spacing:3px; color:var(--amber-glow); text-align:center; opacity:.8;
  }
  #marquee .title{
    font-size:20px; font-weight:bold; letter-spacing:4px; color:var(--amber);
    text-shadow:0 0 8px var(--amber), 0 0 2px var(--amber-glow);
    text-align:center;
  }
  #stats{
    display:flex; flex-direction:column; gap:6px; align-items:flex-end;
  }
  .chip{
    background:var(--panel);
    border:1px solid #2a2a35;
    border-radius:10px;
    padding:6px 10px;
    font-size:12px;
    color:var(--orb-glow);
    display:flex; align-items:center; gap:6px;
    min-width:64px;
    justify-content:flex-end;
  }
  .chip .ico{width:10px;height:10px;border-radius:50%;background:var(--orb); box-shadow:0 0 6px var(--orb-glow);}
  .chip.height .ico{background:var(--amber); box-shadow:0 0 6px var(--amber-glow); border-radius:2px;}
  .chip.height{color:var(--amber-glow);}

  /* World */
  #world{
    position:absolute;
    left:0; right:0; bottom:0;
    height:1400px;
    will-change:transform;
  }
  .pyramid{
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:340px; height:640px;
  }
  .rung{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    background:var(--ladder);
    border:1px solid #000;
    box-shadow:0 0 0 1px var(--ladder-light) inset;
  }
  .rail{
    position:absolute;
    background:var(--ladder-light);
    box-shadow:0 0 4px rgba(0,0,0,.6);
  }
  .platform{
    position:absolute;
    background:linear-gradient(180deg,#3a3a46,#1c1c24);
    border-top:2px solid #4a4a58;
    border-radius:3px;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
  }
  .platform.active-glow{
    border-top-color:var(--amber);
    box-shadow:0 0 14px rgba(255,107,94,.4), 0 4px 10px rgba(0,0,0,.5);
  }

  .orb{
    position:absolute;
    width:16px; height:16px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--orb-glow), var(--orb) 60%, #1a4a3d 100%);
    box-shadow:0 0 12px var(--orb-glow), 0 0 4px var(--orb-glow);
    animation:bob 1.6s ease-in-out infinite, spin 3s linear infinite;
  }
  .orb.collected{ animation:none; opacity:0; transform:scale(2); transition:all .3s ease-out; }
  @keyframes bob{ 0%,100%{ margin-top:0px; } 50%{ margin-top:-8px; } }
  @keyframes spin{ 0%{filter:hue-rotate(0deg);} 100%{filter:hue-rotate(30deg);} }

  .flag{
    position:absolute;
    width:4px; height:60px;
    background:var(--ladder-light);
  }
  .flag::after{
    content:'';
    position:absolute; top:0; left:4px;
    width:0; height:0;
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    border-left:22px solid var(--amber);
    filter:drop-shadow(0 0 6px var(--amber-glow));
    animation:wave 1.2s ease-in-out infinite;
    transform-origin:left center;
  }
  @keyframes wave{ 0%,100%{ transform:skewY(0deg);} 50%{ transform:skewY(8deg);} }

  /* Creature (Fable) */
  #creature{
    position:absolute;
    width:64px; height:76px;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    transition:left .16s ease-out, bottom .28s cubic-bezier(.34,1.56,.64,1);
    z-index:10;
    will-change:left,bottom;
  }
  #creature.facing-left{ transform:translateX(-50%) scaleX(-1); }
  .c-body{
    position:absolute;
    left:12px; top:24px;
    width:40px; height:36px;
    background:var(--creature);
    border-radius:4px;
    box-shadow:inset -6px 0 0 var(--creature-dark);
  }
  .c-ear{
    position:absolute; top:8px;
    width:0; height:0;
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-bottom:16px solid var(--creature);
  }
  .c-ear.l{ left:12px; transform:rotate(-8deg);}
  .c-ear.r{ left:44px; transform:rotate(8deg);}
  .c-eye{
    position:absolute; top:34px;
    width:6px; height:6px;
    background:#141414;
    border-radius:1px;
  }
  .c-eye.l{ left:22px; }
  .c-eye.r{ left:38px; }
  .c-leg{
    position:absolute; bottom:0;
    width:8px; height:16px;
    background:var(--creature-dark);
    border-radius:0 0 2px 2px;
  }
  .c-leg.l1{ left:14px; }
  .c-leg.l2{ left:26px; }
  .c-leg.r1{ left:38px; }
  .c-leg.r2{ left:50px; }

  #creature.walking .c-leg.l1{ animation:stepA .3s ease-in-out infinite; }
  #creature.walking .c-leg.r2{ animation:stepA .3s ease-in-out infinite; }
  #creature.walking .c-leg.l2{ animation:stepB .3s ease-in-out infinite; }
  #creature.walking .c-leg.r1{ animation:stepB .3s ease-in-out infinite; }
  @keyframes stepA{ 0%,100%{ transform:translateY(0) rotate(0deg);} 50%{ transform:translateY(-3px) rotate(-12deg);} }
  @keyframes stepB{ 0%,100%{ transform:translateY(0) rotate(0deg);} 50%{ transform:translateY(-3px) rotate(12deg);} }

  #creature.jumping .c-body{ animation:squashStretch .28s ease-out; }
  @keyframes squashStretch{
    0%{ transform:scaleY(1) scaleX(1); }
    30%{ transform:scaleY(1.15) scaleX(.9) translateY(-4px); }
    100%{ transform:scaleY(1) scaleX(1); }
  }
  #creature.climbing{ animation:climbBob .3s ease-in-out infinite; }
  @keyframes climbBob{ 0%,100%{ margin-top:0;} 50%{ margin-top:-4px;} }

  /* particle burst on collect */
  .burst{
    position:absolute;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--orb-glow);
    box-shadow:0 0 6px var(--orb-glow);
    pointer-events:none;
    animation:burstFly .5s ease-out forwards;
  }
  @keyframes burstFly{
    0%{ opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--dx), var(--dy)) scale(.2); }
  }

  /* win banner */
  #winbanner{
    position:absolute; top:40%; left:50%;
    transform:translate(-50%,-50%) scale(0.6);
    z-index:50;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:all .4s cubic-bezier(.34,1.56,.64,1);
  }
  #winbanner.show{ opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:auto;}
  #winbanner .box{
    background:var(--panel);
    border:2px solid var(--amber);
    box-shadow:0 0 30px rgba(255,107,94,.5);
    border-radius:14px;
    padding:22px 28px;
  }
  #winbanner h2{
    margin:0 0 6px 0; color:var(--amber); letter-spacing:3px; font-size:18px;
    text-shadow:0 0 10px var(--amber-glow);
  }
  #winbanner p{ margin:0 0 14px 0; color:#aaa; font-size:12px; }
  #winbanner button{
    background:var(--amber); border:none; color:#1a1a1a; font-weight:bold;
    padding:8px 18px; border-radius:8px; font-family:inherit; font-size:13px;
    letter-spacing:1px; cursor:pointer;
  }

  /* Controls */
  #controls{
    position:absolute;
    bottom:0; left:0; right:0;
    z-index:30;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom,0px)) 18px;
    pointer-events:none;
  }
  .pad{ display:flex; gap:10px; pointer-events:auto; }
  .btn{
    width:56px; height:56px;
    border-radius:16px;
    background:rgba(20,20,28,.85);
    border:1px solid #33333e;
    color:var(--amber-glow);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    backdrop-filter:blur(4px);
    box-shadow:0 4px 10px rgba(0,0,0,.4);
    transition:transform .08s ease, background .08s ease;
  }
  .btn:active, .btn.active{
    transform:scale(0.9);
    background:rgba(255,107,94,.25);
    border-color:var(--amber);
  }
  #jumpBtn{
    width:72px; height:72px;
    border-radius:50%;
    font-size:13px;
    letter-spacing:1px;
    font-weight:bold;
    pointer-events:auto;
    background:radial-gradient(circle at 35% 30%, var(--amber-glow), var(--amber) 70%);
    color:#1a0a06;
    border:none;
    box-shadow:0 0 18px rgba(255,107,94,.5), 0 4px 10px rgba(0,0,0,.4);
  }
  #jumpBtn:active{ transform:scale(0.9); }

  #hint{
    position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
    color:#666; font-size:10px; letter-spacing:1px; z-index:15;
    text-align:center; width:80%;
    transition:opacity .5s;
  }
</style>
</head>
<body>
<div id="stage">
<div id="frame">
  <div class="dots"></div>

  <div id="hud">
    <div id="marquee">
      <div class="now">NOW SHOWING</div>
      <div class="title">FABLE 5</div>
    </div>
    <div id="stats">
      <div class="chip"><span class="ico"></span><span id="orbCount">0</span>/<span id="orbTotal">6</span></div>
      <div class="chip height"><span class="ico"></span><span id="heightVal">0</span>m</div>
    </div>
  </div>

  <div id="hint">drag / arrows to move · tap JUMP to climb &amp; leap</div>

  <div id="world">
    <!-- built by JS -->
  </div>

  <div id="creature">
    <div class="c-ear l"></div>
    <div class="c-ear r"></div>
    <div class="c-body"></div>
    <div class="c-eye l"></div>
    <div class="c-eye r"></div>
    <div class="c-leg l1"></div>
    <div class="c-leg l2"></div>
    <div class="c-leg r1"></div>
    <div class="c-leg r2"></div>
  </div>

  <div id="winbanner">
    <div class="box">
      <h2>TOP OF THE REEL</h2>
      <p id="winsub">You collected every orb.</p>
      <button id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <div id="controls">
    <div class="pad">
      <div class="btn" id="leftBtn">◀</div>
      <div class="btn" id="rightBtn">▶</div>
    </div>
    <div id="jumpBtn">JUMP</div>
  </div>
</div>
</div>

<script>
(function(){
  const world = document.getElementById('world');
  const creature = document.getElementById('creature');
  const orbCountEl = document.getElementById('orbCount');
  const heightValEl = document.getElementById('heightVal');
  const winbanner = document.getElementById('winbanner');
  const hint = document.getElementById('hint');

  // ---- Level layout: pyramid of platforms (tiers), narrower at top ----
  // each tier: y (bottom offset), x range (left/right px within 340 wide pyramid), width
  const FRAME_W = 340;
  const tiers = [
    {y:40,  w:300},
    {y:180, w:250},
    {y:320, w:200},
    {y:460, w:150},
    {y:600, w:100},
  ];

  const platforms = [];
  tiers.forEach((t,i)=>{
    const el = document.createElement('div');
    el.className='platform'+(i===tiers.length-1?' active-glow':'');
    el.style.width = t.w+'px';
    el.style.height='14px';
    el.style.bottom=t.y+'px';
    el.style.left=(FRAME_W-t.w)/2+'px';
    world.appendChild(el);
    platforms.push({x:(FRAME_W-t.w)/2, w:t.w, y:t.y});

    // rungs/ladder texture between this tier and next (decorative)
    if(i < tiers.length-1){
      const rungGap = t.y===40?70:70;
      const nextY = tiers[i+1].y;
      for(let ry=t.y+30; ry<nextY; ry+=30){
        const rung=document.createElement('div');
        rung.className='rung';
        rung.style.width = (t.w*0.5)+'px';
        rung.style.height='5px';
        rung.style.bottom=ry+'px';
        world.appendChild(rung);
      }
    }
  });

  // flag on top
  const flag = document.createElement('div');
  flag.className='flag';
  flag.style.bottom = (tiers[tiers.length-1].y+14)+'px';
  flag.style.left = (FRAME_W/2 - 2)+'px';
  world.appendChild(flag);

  // ---- Orbs: one per tier plus a couple bonus off to the side ----
  const orbSpecs = [];
  tiers.forEach((t,i)=>{
    orbSpecs.push({x: FRAME_W/2 + (i%2===0? -t.w*0.28 : t.w*0.28), y: t.y+30});
  });
  // one extra bonus orb between tier 1 and 2
  orbSpecs.push({x: FRAME_W/2 + 60, y: 120});

  document.getElementById('orbTotal').textContent = orbSpecs.length;

  const orbEls = orbSpecs.map((o,idx)=>{
    const el = document.createElement('div');
    el.className='orb';
    el.style.left = o.x+'px';
    el.style.bottom = o.y+'px';
    el.style.animationDelay = (idx*0.15)+'s';
    world.appendChild(el);
    return {el, x:o.x, y:o.y, got:false};
  });

  // ---- Player state ----
  let px = FRAME_W/2;      // x within pyramid coord space
  let curTier = 0;         // index into platforms (0 = ground)
  let py = platforms[0].y; // current bottom y
  let collected = 0;
  let facing = 1;
  let busy = false;

  function clampToTier(x, tierIdx){
    const t = platforms[tierIdx];
    const minX = t.x + 10;
    const maxX = t.x + t.w - 10;
    return Math.max(minX, Math.min(maxX, x));
  }

  function render(){
    creature.style.left = px+'px';
    creature.style.bottom = (py+ (FRAME_W?0:0))+'px'; // placeholder, real bottom set below
  }

  function updateTransform(){
    // world coordinate: creature bottom relative to frame's #world (which is bottom:0 of frame)
    creature.style.left = px+'px';
    creature.style.bottom = py+'px';
    creature.style.transform = 'translateX(-50%)'+(facing<0?' scaleX(-1)':'');
    heightValEl.textContent = Math.round(py/20);

    // camera: shift world up as player climbs, keep creature comfortably in view
    const viewportH = document.getElementById('frame').clientHeight;
    const targetShift = Math.min(Math.max(0, py - viewportH*0.42), 560);
    world.style.transform = `translateY(${targetShift}px)`;
    creature.parentElement && (creature.style.bottom = (py)+'px');
    // creature is sibling of world, both bottom-anchored to frame, so shift creature too
    creature.style.transform = `translateY(${targetShift}px) translateX(-50%)`+(facing<0?' scaleX(-1)':'');
  }

  function moveX(dir){
    if(busy) return;
    facing = dir;
    creature.classList.remove('facing-left');
    creature.classList.add('walking');
    px = clampToTier(px + dir*14, curTier);
    updateTransform();
    clearTimeout(moveX._t);
    moveX._t = setTimeout(()=>creature.classList.remove('walking'), 180);
    checkOrbCollisions();
  }

  function tryClimb(){
    if(busy) return;
    // find nearest tier above within horizontal reach whose platform overlaps px roughly
    const nextIdx = curTier+1;
    if(nextIdx >= platforms.length){
      wobble();
      return;
    }
    const next = platforms[nextIdx];
    // must be roughly under next platform's span (with generous margin) to "climb"
    const reach = 60;
    if(px >= next.x - reach && px <= next.x+next.w+reach){
      busy = true;
      creature.classList.add('jumping');
      curTier = nextIdx;
      py = next.y;
      px = clampToTier(px, curTier);
      updateTransform();
      setTimeout(()=>{ creature.classList.remove('jumping'); busy=false; checkOrbCollisions(); checkWin(); }, 300);
    } else {
      wobble();
    }
  }

  function wobble(){
    creature.style.transition='left .16s ease-out, bottom .28s cubic-bezier(.34,1.56,.64,1)';
    creature.animate([
      {transform: creature.style.transform},
      {transform: creature.style.transform + ' translateY(-4px)'},
      {transform: creature.style.transform}
    ], {duration:220, easing:'ease-out'});
  }

  function checkOrbCollisions(){
    orbEls.forEach(o=>{
      if(o.got) return;
      const dx = Math.abs(o.x - px);
      const dy = Math.abs(o.y - py);
      if(dx < 26 && dy < 40){
        o.got = true;
        o.el.classList.add('collected');
        collected++;
        orbCountEl.textContent = collected;
        burst(o.x, o.y);
      }
    });
  }

  function burst(x,y){
    for(let i=0;i<8;i++){
      const p=document.createElement('div');
      p.className='burst';
      p.style.left=x+'px';
      p.style.bottom=y+'px';
      const ang = (i/8)*Math.PI*2;
      p.style.setProperty('--dx',(Math.cos(ang)*30)+'px');
      p.style.setProperty('--dy',(Math.sin(ang)*30 - 10)+'px');
      world.appendChild(p);
      setTimeout(()=>p.remove(),520);
    }
  }

  function checkWin(){
    if(collected >= orbEls.length && curTier === platforms.length-1){
      document.getElementById('winsub').textContent = `Collected all ${orbEls.length} orbs at height ${Math.round(py/20)}m.`;
      winbanner.classList.add('show');
    } else if(curTier === platforms.length-1 && collected < orbEls.length){
      document.getElementById('winsub').textContent = `Reached the top! ${collected}/${orbEls.length} orbs found.`;
      winbanner.classList.add('show');
    }
  }

  // ---- Input: keyboard ----
  const keys = {};
  window.addEventListener('keydown', e=>{
    if(['ArrowLeft','ArrowRight','ArrowUp',' '].includes(e.key)) e.preventDefault();
    if(e.key==='ArrowLeft') moveX(-1);
    if(e.key==='ArrowRight') moveX(1);
    if(e.key==='ArrowUp' || e.key===' ') tryClimb();
  });

  // ---- Input: buttons (touch + mouse) ----
  function bindHold(el, fn, interval=90){
    let t;
    const start = (e)=>{ e.preventDefault(); fn(); el.classList.add('active'); t=setInterval(fn, interval); };
    const stop = ()=>{ clearInterval(t); el.classList.remove('active'); };
    el.addEventListener('touchstart', start, {passive:false});
    el.addEventListener('touchend', stop);
    el.addEventListener('touchcancel', stop);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', stop);
    el.addEventListener('mouseleave', stop);
  }
  bindHold(document.getElementById('leftBtn'), ()=>moveX(-1));
  bindHold(document.getElementById('rightBtn'), ()=>moveX(1));
  document.getElementById('jumpBtn').addEventListener('click', tryClimb);
  document.getElementById('jumpBtn').addEventListener('touchstart', e=>{e.preventDefault(); tryClimb();}, {passive:false});

  // ---- Input: swipe/drag on stage ----
  let dragStartX=null;
  const frame = document.getElementById('frame');
  frame.addEventListener('touchstart', e=>{
    if(e.target.closest('#controls')) return;
    dragStartX = e.touches[0].clientX;
  }, {passive:true});
  frame.addEventListener('touchmove', e=>{
    if(dragStartX===null) return;
    const dx = e.touches[0].clientX - dragStartX;
    if(Math.abs(dx) > 18){
      moveX(dx>0?1:-1);
      dragStartX = e.touches[0].clientX;
    }
  }, {passive:true});
  frame.addEventListener('touchend', ()=>{ dragStartX=null; });

  document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());

  // fade hint after a bit
  setTimeout(()=>{ hint.style.opacity='0'; }, 4500);

  // init
  py = platforms[0].y;
  px = FRAME_W/2;
  updateTransform();
  checkOrbCollisions();
})();
</script>
</body>
</html>
