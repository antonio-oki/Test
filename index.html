<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>iOS Video Frame Editor</title><style>body{font-family:-apple-system,Arial;background:#0f0f0f;color:#fff;margin:0;padding:12px}h2{margin:8px 0}video,canvas{width:100%;background:#000;border-radius:12px;margin-top:10px}button,input{padding:14px;margin:5px;border-radius:12px;border:none;font-size:16px}button{background:#1f1f1f;color:#fff}button:active{transform:scale(0.97)}#frames{display:flex;gap:8px;overflow-x:auto;margin-top:12px;padding-bottom:10px}img{width:90px;height:60px;object-fit:cover;border:2px solid #444;border-radius:8px}</style></head><body><h2>iOS Frame Editor</h2><input id='upload' type='file' accept='video/*'><video id='video' playsinline controls></video><canvas id='canvas'></canvas><div><button onclick='step(-1)'>◀</button><button onclick='step(1)'>▶</button><button onclick='capture()'>Add Frame</button><button onclick='del()'>Delete Frame</button></div><div id='info'></div><div id='frames'></div><script>const v=document.getElementById('video');const c=document.getElementById('canvas');const ctx=c.getContext('2d');const frames=[];let sel=-1;upload.onchange=e=>v.src=URL.createObjectURL(e.target.files[0]);v.onloadedmetadata=()=>{c.width=v.videoWidth;c.height=v.videoHeight;draw()};v.onseeked=draw;function draw(){ctx.drawImage(v,0,0,c.width,c.height);info.textContent='t='+v.currentTime.toFixed(2)+'s'}function step(d){v.pause();v.currentTime=Math.max(0,v.currentTime+d/30)}function capture(){draw();frames.push(c.toDataURL('image/jpeg'));render()}function del(){if(sel<0)return;frames.splice(sel,1);sel=-1;render()}function render(){const f=document.getElementById('frames');f.innerHTML='';frames.forEach((x,i)=>{let im=document.createElement('img');im.src=x;im.onclick=()=>{sel=i;render()};im.style.borderColor=i===sel?'lime':'#444';f.appendChild(im)})}</script></body></html>
