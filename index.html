<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gen AI 1</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar">

<h2>Gen AI 1</h2>

<button id="newChat">
＋ New Chat
</button>

<div class="history">
<h4>History</h4>
<div id="historyList"></div>
</div>

<div class="sidebar-bottom">
<button id="settingsBtn">
⚙ Settings
</button>
</div>

</aside>


<!-- Main Chat -->

<main class="main">

<header>

<button id="menuBtn">
☰
</button>

<div class="model">
Gen AI 1 ▾
</div>

</header>


<div id="messages">

<div class="welcome">
<h1>What can I help with?</h1>
</div>

</div>



<footer>

<div class="composer">

<textarea 
id="input"
placeholder="Message Gen AI 1..."
></textarea>


<div class="actions">

<button id="attach">
📎
</button>

<button id="send">
↑
</button>

</div>

</div>

<p>
Gen AI 1 can make mistakes. Check important info.
</p>

</footer>


</main>


</div>


<!-- Settings Modal -->

<div id="settings" class="modal">

<div class="modal-box">

<h2>Settings</h2>

<label>
Theme
</label>

<select id="theme">

<option value="dark">
Dark
</option>

<option value="light">
Light
</option>

</select>


<button id="closeSettings">
Done
</button>


</div>

</div>


<script src="app.js"></script>

</body>
</html>
