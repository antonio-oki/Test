<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macintosh System 1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<select id="resolutionSelect">
    <option value="512x342">512×342</option>
    <option value="640x480">640×480</option>
    <option value="800x600">800×600</option>
    <option value="1024x768">1024×768</option>
    <option value="fullscreen">Fullscreen</option>
</select>

<div id="screen">

    <div id="menubar">
         File Edit View Special
    </div>

    <div id="desktop">

        <div class="icon" data-app="write">
            📄
            <span>Write</span>
        </div>

        <div class="icon" data-app="calc">
            🧮
            <span>Calculator</span>
        </div>

        <div class="icon" data-app="folder">
            📁
            <span>Files</span>
        </div>

        <!-- WINDOWS -->

        <div class="window" id="writeWindow">
            <div class="titlebar">Write</div>
            <div class="content">
                <textarea>Welcome to Macintosh</textarea>
            </div>
        </div>

        <div class="window" id="calcWindow">
            <div class="titlebar">Calculator</div>
            <div class="content">
                <input id="calcInput" placeholder="Type math...">
                <div id="calcOut"></div>
            </div>
        </div>

        <!-- TRASH -->
        <div id="trash">
            🗑️
            <span>Trash</span>
        </div>

    </div>
</div>

<div id="cursor"></div>

<script src="script.js"></script>
</body>
</html>
