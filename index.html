<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0f0f0f;--bg2:#181818;--bg3:#272727;--bg4:#3a3a3a;--fg:#f1f1f1;--fg2:#aaa;--fg3:#717171;--accent:#e63946;--accent-h:#ff4d5a;--border:#303030;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--fg);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical}

#header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:var(--bg);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:16px;min-width:200px}
.menu-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.menu-btn:hover{background:var(--bg3)}
.logo{display:flex;align-items:center;gap:6px;font-weight:800;font-size:20px;cursor:pointer;letter-spacing:-.5px}
.logo-icon{width:32px;height:22px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-icon i{font-size:11px;color:#fff}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;max-width:640px;margin:0 auto}
.search-box{display:flex;width:100%}
.search-box input{flex:1;border-radius:20px 0 0 20px;border-right:none;padding:8px 16px;background:var(--bg2);font-size:14px}
.search-box input::placeholder{color:var(--fg3)}
.search-btn{width:64px;height:42px;background:var(--bg3);border:1px solid var(--border);border-left:none;border-radius:0 20px 20px 0;display:flex;align-items:center;justify-content:center;transition:background .2s}
.search-btn:hover{background:var(--bg4)}
.header-right{display:flex;align-items:center;gap:8px;min-width:200px;justify-content:flex-end}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.icon-btn:hover{background:var(--bg3)}
.avatar-btn{width:32px;height:32px;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.avatar-btn:hover{border-color:var(--fg3)}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

#sidebar{position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--bg);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;z-index:90;transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sidebar.collapsed{transform:translateX(-240px)}
.sidebar-section{padding:0 12px;margin-bottom:12px}
.sidebar-section+.sidebar-section{border-top:1px solid var(--border);padding-top:12px}
.sidebar-item{display:flex;align-items:center;gap:20px;padding:8px 12px;border-radius:var(--radius-sm);font-size:14px;transition:background .15s;cursor:pointer;white-space:nowrap}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-item.active{background:var(--bg3);font-weight:600}
.sidebar-item i{width:24px;text-align:center;font-size:18px}
.sidebar-item span{overflow:hidden;text-overflow:ellipsis}
.sidebar-title{padding:8px 12px 4px;font-size:12px;text-transform:uppercase;color:var(--fg3);letter-spacing:.5px;font-weight:600}

#main{margin-left:240px;margin-top:56px;padding:24px;transition:margin-left .3s;min-height:calc(100vh - 56px)}
#main.expanded{margin-left:0}

.chips-wrap{overflow:visible;margin-bottom:16px}
.chips{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 16px;border-radius:8px;font-size:14px;font-weight:500;background:var(--bg3);white-space:nowrap;transition:all .2s;cursor:pointer;flex-shrink:0}
.chip:hover{background:var(--bg4)}
.chip.active{background:var(--fg);color:var(--bg);font-weight:600}

.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.video-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;transition:transform .2s}
.video-card:hover{transform:scale(1.02)}
.video-thumb{width:100%;aspect-ratio:16/9;background:var(--bg3);position:relative;overflow:hidden}
.video-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.video-card:hover .video-thumb img{transform:scale(1.05)}
.video-duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.85);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:600}
.video-info{display:flex;gap:12px;padding:12px 0}
.video-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden}
.video-avatar img{width:100%;height:100%;object-fit:cover}
.video-meta{flex:1;min-width:0}
.video-title{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.video-channel{font-size:13px;color:var(--fg2)}
.video-stats{font-size:13px;color:var(--fg3)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.empty-state i{font-size:64px;color:var(--bg4);margin-bottom:20px}
.empty-state h2{font-size:24px;font-weight:700;margin-bottom:8px}
.empty-state p{color:var(--fg2);font-size:15px;margin-bottom:24px;max-width:420px;line-height:1.6}
.btn-primary{padding:10px 24px;background:var(--accent);color:#fff;border-radius:20px;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-secondary{padding:10px 24px;background:var(--bg3);color:var(--fg);border-radius:20px;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-danger{padding:10px 24px;background:transparent;color:var(--accent);border-radius:20px;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent)}
.btn-danger:hover{background:var(--accent);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:16px;width:100%;max-width:520px;box-shadow:var(--shadow);animation:slideUp .3s cubic-bezier(.4,0,.2,1);overflow:hidden;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.modal-header h2{font-size:20px;font-weight:700}
.modal-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.modal-close:hover{background:var(--bg3)}
.modal-body{padding:20px 24px 24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--fg2)}
.form-group input,.form-group textarea,.form-group select{width:100%}
.form-group textarea{min-height:80px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.form-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:background .2s;margin-top:8px}
.form-submit:hover{background:var(--accent-h)}
.form-submit:disabled{opacity:.5;cursor:not-allowed}
.form-error{color:var(--accent);font-size:13px;margin-top:4px;display:none}
.form-error.show{display:block}

.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;position:relative}
.upload-zone:hover{border-color:var(--accent);background:rgba(230,57,70,.04)}
.upload-zone.has-file{border-style:solid;border-color:var(--accent);padding:16px}
.upload-zone i{font-size:48px;color:var(--fg3);margin-bottom:12px}
.upload-zone p{color:var(--fg2);font-size:14px}
.upload-zone .accent{color:var(--accent);font-weight:600}
.upload-zone input{display:none}
.upload-file-info{display:flex;align-items:center;gap:12px;text-align:left}
.upload-file-info i{font-size:32px;color:var(--accent);margin:0}
.upload-file-info .file-name{font-weight:600;font-size:14px;word-break:break-all}
.upload-file-info .file-size{font-size:12px;color:var(--fg3)}
.upload-file-info .change-link{font-size:12px;color:var(--accent);margin-top:4px;cursor:pointer}

.thumb-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.thumb-zone{flex:1;border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.thumb-zone:hover{border-color:var(--accent)}
.thumb-zone.has-file{border-style:solid;border-color:var(--accent);padding:8px}
.thumb-zone input{display:none}
.thumb-zone i{font-size:28px;color:var(--fg3);margin-bottom:6px}
.thumb-zone p{font-size:12px;color:var(--fg3)}
.thumb-preview{width:140px;aspect-ratio:16/9;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.thumb-preview img{width:100%;height:100%;object-fit:cover}
.thumb-preview .placeholder-text{font-size:11px;color:var(--fg3);text-align:center;padding:8px}

.player-view{max-width:1100px;margin:0 auto}
.player-container{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden;position:relative}
.player-container video{width:100%;height:100%;object-fit:contain;display:block}
.player-details{display:flex;gap:16px;margin-top:16px}
.player-info{flex:1}
.player-title{font-size:22px;font-weight:700;margin-bottom:12px;line-height:1.3}
.player-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.action-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:var(--bg3);font-size:14px;font-weight:500;transition:background .2s}
.action-btn:hover{background:var(--bg4)}
.action-btn.liked{color:var(--accent)}
.action-btn i{font-size:18px}
.player-channel{display:flex;align-items:center;gap:12px;padding:16px 0;border-top:1px solid var(--border)}
.player-channel-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden}
.player-channel-avatar img{width:100%;height:100%;object-fit:cover}
.player-channel-name{font-weight:600;font-size:15px}
.player-channel-subs{font-size:13px;color:var(--fg3)}
.player-description{margin-top:16px;padding:16px;background:var(--bg2);border-radius:var(--radius);font-size:14px;color:var(--fg2);line-height:1.6}
.player-sidebar{width:400px;flex-shrink:0}
.player-sidebar h3{font-size:16px;font-weight:700;margin-bottom:16px}
.sidebar-video{display:flex;gap:8px;margin-bottom:12px;cursor:pointer}
.sidebar-video:hover .sv-title{color:var(--fg)}
.sv-thumb{width:168px;aspect-ratio:16/9;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;background:var(--bg3)}
.sv-thumb img{width:100%;height:100%;object-fit:cover}
.sv-info{flex:1;min-width:0}
.sv-title{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--fg2);transition:color .2s;margin-bottom:4px}
.sv-channel{font-size:12px;color:var(--fg3)}
.sv-stats{font-size:12px;color:var(--fg3)}

#toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:12px 24px;background:var(--fg);color:var(--bg);border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow);animation:toastIn .3s,toastOut .3s 2.7s forwards;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

.section-title{font-size:20px;font-weight:700;margin-bottom:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.section-header .section-title{margin-bottom:0}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--fg2);font-size:14px;font-weight:500;margin-bottom:16px;transition:color .2s}
.back-btn:hover{color:var(--fg)}
.delete-btn{color:var(--accent);opacity:0;transition:opacity .2s}
.video-card:hover .delete-btn{opacity:1}
.upload-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(230,57,70,.4);z-index:80;transition:transform .2s,background .2s}
.upload-fab:hover{transform:scale(1.1);background:var(--accent-h)}
.upload-fab.show{display:flex}
.dropdown{position:absolute;top:48px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);min-width:200px;box-shadow:var(--shadow);display:none;z-index:150;overflow:hidden}
.dropdown.show{display:block;animation:fadeIn .15s}
.dropdown-item{padding:10px 16px;font-size:14px;display:flex;align-items:center;gap:12px;transition:background .15s;cursor:pointer}
.dropdown-item:hover{background:var(--bg3)}
.dropdown-item i{width:20px;text-align:center;color:var(--fg2)}
.dropdown-item.danger{color:var(--accent)}
.dropdown-item.danger i{color:var(--accent)}
.user-menu-wrap{position:relative}

.storage-bar{margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:var(--radius-sm);font-size:13px}
.storage-bar .bar-track{height:6px;background:var(--bg);border-radius:3px;margin-top:8px;overflow:hidden}
.storage-bar .bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.storage-bar .bar-text{display:flex;justify-content:space-between;margin-top:4px;color:var(--fg3);font-size:12px}

.no-video-thumb{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg3),var(--bg4));color:var(--fg3);gap:8px}
.no-video-thumb i{font-size:32px}

.profile-banner{width:100%;height:160px;background:linear-gradient(135deg,var(--accent),#1a1a2e,var(--bg4));border-radius:var(--radius);margin-bottom:-40px;position:relative;overflow:hidden}
.profile-banner::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.avatar-edit-wrap{position:relative;display:inline-block;cursor:pointer}
.avatar-edit-wrap .avatar-edit-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.avatar-edit-wrap:hover .avatar-edit-overlay{opacity:1}
.avatar-edit-overlay i{color:#fff;font-size:18px}
.avatar-edit-wrap input{display:none}

.clip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.clip-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;position:relative;aspect-ratio:9/16;background:var(--bg3);transition:transform .2s}
.clip-card:hover{transform:scale(1.03)}
.clip-card img{width:100%;height:100%;object-fit:cover;display:block}
.clip-card .clip-overlay{position:absolute;left:0;right:0;bottom:0;padding:10px 8px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);font-size:12px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#fff}
.clip-card .clip-views{position:absolute;left:8px;bottom:44px;font-size:11px;color:var(--fg2);display:flex;align-items:center;gap:4px}
.clip-card .clip-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}

#clipsView{position:fixed;inset:0;z-index:150;background:#000;display:none}
#clipsView.show{display:flex;flex-direction:column}
.clips-top-bar{flex-shrink:0;padding:16px;display:flex;align-items:center;justify-content:space-between;z-index:5;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)}
.clips-top-bar .clips-back{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.clips-top-bar h2{color:#fff;font-size:17px;font-weight:700}
.clips-top-bar .clips-mute{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.clips-feed{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;display:flex;flex-direction:column}
.clips-feed::-webkit-scrollbar{display:none}
.clip-slide{flex:1 0 100%;min-height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.clip-slide video{width:100%;height:100%;object-fit:contain;max-width:480px;margin:0 auto;background:#000}
.clip-info-panel{position:absolute;left:0;bottom:0;right:76px;padding:16px 16px 28px;z-index:4;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);color:#fff;pointer-events:none}
.clip-info-panel .clip-channel{display:flex;align-items:center;gap:10px;margin-bottom:10px;pointer-events:all}
.clip-info-panel .clip-channel img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.clip-info-panel .clip-channel-name{font-weight:700;font-size:14px}
.clip-info-panel .clip-sub-btn{margin-left:8px;padding:5px 14px;border-radius:14px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;pointer-events:all}
.clip-info-panel .clip-title{font-size:14px;line-height:1.4;margin-bottom:6px}
.clip-action-rail{position:absolute;right:8px;bottom:24px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:22px}
.clip-action{display:flex;flex-direction:column;align-items:center;gap:4px;color:#fff}
.clip-action button{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;transition:transform .15s,background .2s}
.clip-action button:active{transform:scale(.88)}
.clip-action button.liked{color:var(--accent)}
.clip-action button.liked i{animation:heartPop .35s ease}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.clip-action .clip-action-count{font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.clips-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px}
.clips-empty i{font-size:56px;color:var(--fg3);margin-bottom:16px}

.clip-toggle{display:flex;gap:0;margin-bottom:16px;background:var(--bg3);padding:3px;border-radius:24px;width:fit-content}
.clip-toggle button{padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;color:var(--fg2);transition:all .2s;display:flex;align-items:center;gap:8px}
.clip-toggle button.active{background:var(--accent);color:#fff}

.comments-sheet{position:fixed;right:0;bottom:0;left:0;z-index:210;background:var(--bg2);border-radius:16px 16px 0 0;max-height:70vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.comments-sheet.show{transform:translateY(0)}
@media(min-width:640px){.comments-sheet{left:auto;width:420px;right:24px;bottom:24px;border-radius:16px;max-height:80vh}}
.comments-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.comments-head h3{font-size:15px;font-weight:700}
.comments-list{flex:1;overflow-y:auto;padding:8px 18px}
.comment-row{display:flex;gap:10px;padding:10px 0}
.comment-row img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.comment-user{font-size:13px;font-weight:700}
.comment-time{font-size:11px;color:var(--fg3);font-weight:400;margin-left:6px}
.comment-text{font-size:13px;color:var(--fg2);margin-top:2px;line-height:1.4}
.comments-empty{text-align:center;color:var(--fg3);font-size:13px;padding:32px 0}
.comments-input-row{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0}
.comments-input-row input{flex:1}
.comments-input-row button{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}

.server-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg3);padding:4px 0}
.server-dot{width:8px;height:8px;border-radius:50%;background:#2a9d8f;animation:pulse 2s infinite}
.server-dot.offline{background:var(--accent);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.server-status{font-weight:600}
.server-status.offline{color:var(--accent)}

@media(max-width:1024px){.player-details{flex-direction:column}.player-sidebar{width:100%}.sv-thumb{width:160px}}
@media(max-width:768px){#sidebar{transform:translateX(-240px)}#sidebar.mobile-open{transform:translateX(0)}#main{margin-left:0!important}.video-grid{grid-template-columns:1fr}.header-center{display:none}.header-left{min-width:auto}.header-right{min-width:auto}.clip-action-rail{right:4px;bottom:16px;gap:16px}.clip-action button{width:40px;height:40px;font-size:18px}.clip-info-panel{right:56px;bottom:0}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<header id="header">
  <div class="header-left">
    <button class="menu-btn" id="menuToggle" aria-label="Toggle sidebar"><i class="fas fa-bars"></i></button>
    <div class="logo" id="logoBtn"><div class="logo-icon"><i class="fas fa-play"></i></div><span>MyTube</span></div>
  </div>
  <div class="header-center">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search videos..." aria-label="Search">
      <button class="search-btn" id="searchBtn" aria-label="Search"><i class="fas fa-search"></i></button>
    </div>
  </div>
  <div class="header-right">
    <div class="server-indicator" id="serverIndicator">
      <div class="server-dot" id="serverDot"></div>
      <span class="server-status" id="serverStatus">Connecting...</span>
    </div>
    <div id="authBtns"></div>
  </div>
</header>

<nav id="sidebar" aria-label="Main navigation">
  <div class="sidebar-section" id="sidebarMain"></div>
  <div class="sidebar-section" id="sidebarLibrary"></div>
</nav>

<main id="main"></main>
<button class="upload-fab" id="uploadFab" aria-label="Upload video"><i class="fas fa-plus"></i></button>

<div id="clipsView">
  <div class="clips-top-bar">
    <div class="clips-back" id="clipsBackBtn"><i class="fas fa-arrow-left"></i></div>
    <h2><i class="fas fa-bolt" style="color:var(--accent);margin-right:6px"></i>Clips</h2>
    <div class="clips-mute" id="clipsMuteBtn"><i class="fas fa-volume-mute" id="clipsMuteIcon"></i></div>
  </div>
  <div class="clips-feed" id="clipsFeed"></div>
</div>

<div class="modal-overlay" id="commentsOverlay" style="background:rgba(0,0,0,.5);z-index:205">
  <div class="comments-sheet" id="commentsSheet">
    <div class="comments-head">
      <h3 id="commentsTitle">Comments</h3>
      <button class="modal-close" id="commentsCloseBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comments-input-row">
      <input type="text" id="commentInput" placeholder="Add a comment..." maxlength="300">
      <button id="commentSendBtn" aria-label="Post comment"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="authModalTitle">Sign In</h2>
      <button class="modal-close" onclick="closeModal('authModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div id="authLoginForm">
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"></div>
        <div class="form-error" id="loginError"></div>
        <button class="form-submit" id="loginBtn">Sign In</button>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--fg2)">Don't have an account? <a href="#" style="color:var(--accent);font-weight:600" id="showRegister">Sign Up</a></p>
      </div>
      <div id="authRegisterForm" style="display:none">
        <div class="form-group"><label>Display Name</label><input type="text" id="regName" placeholder="Your public name" autocomplete="username"></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Choose a password (min 6 chars)" autocomplete="new-password"></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="regPassConfirm" placeholder="Confirm password" autocomplete="new-password"></div>
        <div class="form-error" id="regError"></div>
        <button class="form-submit" id="registerBtn">Create Account</button>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--fg2)">Already have an account? <a href="#" style="color:var(--accent);font-weight:600" id="showLogin">Sign In</a></p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="uploadModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h2>Upload Video</h2>
      <button class="modal-close" onclick="closeModal('uploadModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div id="storageBar"></div>
      <div class="form-group"><label>Content Type</label>
        <div class="clip-toggle" id="uploadTypeToggle">
          <button type="button" class="active" data-type="video"><i class="fas fa-film"></i> Video</button>
          <button type="button" data-type="clip"><i class="fas fa-bolt"></i> Clip</button>
        </div>
      </div>
      <div class="form-group"><label>Video File</label>
        <div class="upload-zone" id="videoZone">
          <input type="file" id="videoInput" accept="video/*">
          <i class="fas fa-film"></i>
          <p>Click to select a <span class="accent">video file</span></p>
          <p style="font-size:12px;color:var(--fg3);margin-top:8px">MP4, WebM, OGG, MOV supported</p>
        </div>
      </div>
      <div class="form-group"><label>Thumbnail (optional)</label>
        <div class="thumb-row">
          <div class="thumb-preview" id="thumbPreviewBox"><span class="placeholder-text">Auto-generated<br>from video</span></div>
          <div class="thumb-zone" id="thumbZone">
            <input type="file" id="thumbInput" accept="image/*">
            <i class="fas fa-image"></i>
            <p>Click to upload custom thumbnail</p>
          </div>
        </div>
      </div>
      <div class="form-group"><label>Title</label><input type="text" id="uploadTitle" placeholder="Add a title that describes your video" maxlength="100"></div>
      <div class="form-group"><label>Description</label><textarea id="uploadDesc" placeholder="Tell viewers about your video" maxlength="5000"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Category</label>
          <select id="uploadCat">
            <option value="General">General</option><option value="Music">Music</option><option value="Gaming">Gaming</option>
            <option value="Education">Education</option><option value="Science">Science</option><option value="Technology">Technology</option>
            <option value="Entertainment">Entertainment</option><option value="Sports">Sports</option><option value="News">News</option>
            <option value="Cooking">Cooking</option><option value="Travel">Travel</option><option value="Comedy">Comedy</option>
          </select>
        </div>
        <div class="form-group"><label>Visibility</label>
          <select id="uploadVis"><option value="public">Public</option><option value="private">Private</option></select>
        </div>
      </div>
      <div class="form-error" id="uploadError"></div>
      <button class="form-submit" id="uploadSubmitBtn">Upload</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2 id="confirmTitle">Confirm</h2>
      <button class="modal-close" onclick="closeModal('confirmModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p id="confirmMessage" style="color:var(--fg2);font-size:15px;margin-bottom:20px;line-height:1.6"></p>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button class="btn-secondary" onclick="closeModal('confirmModal')" style="padding:8px 20px;font-size:13px">Cancel</button>
        <button class="btn-danger" id="confirmAction" style="padding:8px 20px;font-size:13px">Confirm</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ===== STATE ===== */
let state = {
  currentUser: null,
  currentView: 'home',
  sidebarOpen: window.innerWidth > 768,
  activeCategory: 'All',
  searchQuery: '',
  selectedVideoId: null,
  userDropdownOpen: false,
  uploadedVideoData: null,
  uploadedVideoName: '',
  uploadedVideoSize: 0,
  uploadedThumbData: null,
  videoDuration: '0:00',
  uploadType: 'video',
  clipsMuted: true,
  commentsVideoId: null,
  serverOnline: false
};

const CATEGORIES = ['All','Music','Gaming','Education','Science','Technology','Entertainment','Sports','News','Cooking','Travel','Comedy','General'];
const MAX_STORAGE_MB = 40;
const SUPABASE_URL = 'https://obqlmgjkeasltftfuxuu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icWxtZ2prZWFzbHRmdGZ1eHV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk5NTg5NjcsImV4cCI6MjA2NTUzNDk2N30.BkjVvbOLHkAcLMqWrPz0bGJcC7HqFH0S-hhxY7IQkCo';

/* ===== SUPABASE CLIENT ===== */
let sb = null;
try {
  sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
} catch(e) { sb = null; }

function updateServerStatus(online) {
  state.serverOnline = online;
  const dot = document.getElementById('serverDot');
  const txt = document.getElementById('serverStatus');
  if (dot) { dot.classList.toggle('offline', !online); }
  if (txt) { txt.textContent = online ? 'Online' : 'Local Mode'; txt.classList.toggle('offline', !online); }
}

async function initServer() {
  if (!sb) { updateServerStatus(false); return; }
  try {
    const { data, error } = await sb.from('profiles').select('id').limit(1);
    updateServerStatus(!error);
  } catch(e) { updateServerStatus(false); }
}

async function sbSignUp(email, password, displayName) {
  if (!sb) return { error: { message: 'Server unavailable' } };
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) return { error };
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, display_name: displayName, avatar_url: null, subs: 0, created_at: new Date().toISOString() });
  }
  return { data };
}

async function sbSignIn(email, password) {
  if (!sb) return { error: { message: 'Server unavailable' } };
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return { error };
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  return { data: { user: data.user, profile } };
}

async function sbSignOut() {
  if (sb) { try { await sb.auth.signOut(); } catch(e) {} }
}

async function sbUpdateAvatar(avatarUrl) {
  if (!sb || !state.currentUser) return;
  await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', state.currentUser.id);
  state.currentUser.avatar = avatarUrl;
  localStorage.setItem('mt_user_avatar', avatarUrl);
}

/* ===== STORAGE ===== */
function getStoreSize() { let t=0; for(let k in localStorage){if(localStorage.hasOwnProperty(k))t+=localStorage[k].length*2;} return t; }
function formatBytes(b) { if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(2)+' MB'; }
function getVideos() { return JSON.parse(localStorage.getItem('mt_videos')||'[]'); }
function saveVideos(v) { localStorage.setItem('mt_videos',JSON.stringify(v)); }
function getHistory() { return JSON.parse(localStorage.getItem('mt_history')||'[]'); }
function saveHistory(h) { localStorage.setItem('mt_history',JSON.stringify(h)); }
function getLikes() { return JSON.parse(localStorage.getItem('mt_likes')||'[]'); }
function saveLikes(l) { localStorage.setItem('mt_likes',JSON.stringify(l)); }
function getSubs() { return state.currentUser ? JSON.parse(localStorage.getItem('mt_subs_'+state.currentUser.id)||'[]') : []; }
function getAllComments() { return JSON.parse(localStorage.getItem('mt_comments')||'{}'); }
function saveAllComments(c) { localStorage.setItem('mt_comments',JSON.stringify(c)); }
function getComments(vid) { return getAllComments()[vid]||[]; }
function addComment(vid, text) {
  const all = getAllComments(); if(!all[vid])all[vid]=[];
  all[vid].push({ user: state.currentUser?state.currentUser.displayName:'Guest', text, ts: Date.now(), avatar: state.currentUser?getUserAvatar():null });
  saveAllComments(all);
}

/* ===== CLEAN OLD DATA ===== */
(function cleanOld(){
  let vids=getVideos(), cleaned=vids.filter(v=>v.videoData);
  if(cleaned.length!==vids.length) saveVideos(cleaned);
  /* Remove old username-based session */
  const oldSession = localStorage.getItem('mt_session');
  if (oldSession && !oldSession.includes('@')) localStorage.removeItem('mt_session');
})();

/* ===== HELPERS ===== */
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function timeAgo(ts) {
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return'just now';if(m<60)return m+' min ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  const dy=Math.floor(h/24);if(dy<30)return dy+'d ago';
  const mo=Math.floor(dy/30);if(mo<12)return mo+'mo ago';
  return Math.floor(mo/12)+'y ago';
}
function formatViews(n) { if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toString(); }
function escHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function genAvatar(name) {
  const c=document.createElement('canvas');c.width=80;c.height=80;const ctx=c.getContext('2d');
  let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);
  ctx.fillStyle='hsl('+(Math.abs(h)%360)+',55%,45%)';ctx.fillRect(0,0,80,80);
  ctx.fillStyle='#fff';ctx.font='bold 36px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(name.charAt(0).toUpperCase(),40,42);
  return c.toDataURL('image/png');
}

function getUserAvatar() {
  if (!state.currentUser) return genAvatar('G');
  const local = localStorage.getItem('mt_user_avatar');
  if (local) return local;
  if (state.currentUser.avatar) return state.currentUser.avatar;
  return genAvatar(state.currentUser.displayName || 'U');
}

function getChannelAvatar(channelName) { return genAvatar(channelName); }

function genThumbFromVideo(videoDataUrl, title) {
  return new Promise((resolve) => {
    const video=document.createElement('video');video.muted=true;video.preload='metadata';video.src=videoDataUrl;
    video.onloadeddata=()=>{video.currentTime=Math.max(0.1,video.duration*0.25);};
    video.onseeked=()=>{const c=document.createElement('canvas');c.width=640;c.height=360;const ctx=c.getContext('2d');ctx.drawImage(video,0,0,640,360);resolve(c.toDataURL('image/jpeg',0.8));};
    video.onerror=()=>{const c=document.createElement('canvas');c.width=640;c.height=360;const ctx=c.getContext('2d');const g=ctx.createLinearGradient(0,0,640,360);g.addColorStop(0,'#e63946');g.addColorStop(1,'#000');ctx.fillStyle=g;ctx.fillRect(0,0,640,360);ctx.fillStyle='#fff';ctx.font='bold 24px Outfit,sans-serif';ctx.textAlign='center';let t=(title||'Video').length>35?(title||'Video').slice(0,32)+'...':(title||'Video');ctx.fillText(t,320,200);resolve(c.toDataURL('image/jpeg',0.8));};
  });
}

function formatDuration(sec) { if(!sec||isNaN(sec))return'0:00';const m=Math.floor(sec/60),s=Math.floor(sec%60);return m+':'+String(s).padStart(2,'0'); }

function showToast(msg) { const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),3000); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }
function showFormError(id, msg) { const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000); }

let confirmCallback = null;
function showConfirm(title, message, onConfirm) {
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMessage').textContent=message;
  confirmCallback=onConfirm; openModal('confirmModal');
}
document.getElementById('confirmAction').addEventListener('click',()=>{closeModal('confirmModal');if(confirmCallback){confirmCallback();confirmCallback=null;}});

/* ===== RENDER ===== */
function render() { renderHeader(); renderSidebar();
  const clipsEl=document.getElementById('clipsView'), mainEl=document.getElementById('main');
  if(state.currentView==='clips'){clipsEl.classList.add('show');mainEl.style.display='none';document.getElementById('uploadFab').classList.remove('show');renderClipsFeed();}
  else{clipsEl.classList.remove('show');mainEl.style.display='';pauseAllClips();renderMain();renderFab();}
}

function renderHeader() {
  const ab=document.getElementById('authBtns');
  if(state.currentUser){
    const u=state.currentUser, avatar=getUserAvatar();
    ab.innerHTML=`<div class="user-menu-wrap">
      <div class="avatar-btn" id="avatarBtn"><img src="${avatar}" alt="${escHtml(u.displayName)}"></div>
      <div class="dropdown" id="userDropdown">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
          <img src="${avatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">
          <div><div style="font-weight:700;font-size:15px">${escHtml(u.displayName)}</div><div style="font-size:12px;color:var(--fg3)">${escHtml(u.email)}</div></div>
        </div>
        <div class="dropdown-item" data-action="profile"><i class="fas fa-user"></i>Your Channel</div>
        <div class="dropdown-item" data-action="upload"><i class="fas fa-upload"></i>Upload Video</div>
        <div class="dropdown-item" data-action="history"><i class="fas fa-history"></i>Watch History</div>
        <div class="dropdown-item danger" data-action="logout"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </div>`;
    document.getElementById('avatarBtn').onclick=(e)=>{e.stopPropagation();state.userDropdownOpen=!state.userDropdownOpen;document.getElementById('userDropdown').classList.toggle('show',state.userDropdownOpen);};
    ab.querySelectorAll('.dropdown-item').forEach(item=>{item.onclick=()=>{
      state.userDropdownOpen=false;document.getElementById('userDropdown').classList.remove('show');
      const a=item.dataset.action;
      if(a==='logout')logout();else if(a==='upload')openUploadModal();
      else if(a==='profile'){state.activeCategory='All';state.currentView='profile';render();}
      else if(a==='history'){state.currentView='history';render();}
    };});
  } else {
    ab.innerHTML='<button class="btn-primary" id="signInBtn" style="padding:6px 16px;font-size:13px">Sign In</button>';
    document.getElementById('signInBtn').onclick=()=>openModal('authModal');
  }
  document.getElementById('searchInput').value=state.searchQuery;
}

function renderSidebar() {
  const mainItems=[{icon:'fa-house',label:'Home',view:'home'},{icon:'fa-bolt',label:'Clips',view:'clips'},{icon:'fa-fire',label:'Trending',view:'trending'}];
  let libItems=[{icon:'fa-clock-rotate-left',label:'History',view:'history'},{icon:'fa-thumbs-up',label:'Liked Videos',view:'liked'}];
  if(state.currentUser)libItems.unshift({icon:'fa-user',label:'Your Channel',view:'profile'});
  document.getElementById('sidebarMain').innerHTML=mainItems.map(i=>`<div class="sidebar-item ${state.currentView===i.view?'active':''}" data-view="${i.view}"><i class="fas ${i.icon}"></i><span>${i.label}</span></div>`).join('');
  document.getElementById('sidebarLibrary').innerHTML=`<div class="sidebar-title">Library</div>`+libItems.map(i=>`<div class="sidebar-item ${state.currentView===i.view?'active':''}" data-view="${i.view}"><i class="fas ${i.icon}"></i><span>${i.label}</span></div>`).join('')+(state.currentUser?`<div class="sidebar-title" style="margin-top:12px">Subscriptions</div>`+getSubs().map(s=>`<div class="sidebar-item"><img src="${getChannelAvatar(s)}" style="width:24px;height:24px;border-radius:50%;object-fit:cover"><span>${escHtml(s)}</span></div>`).join('')||'<div style="padding:8px 12px;font-size:13px;color:var(--fg3)">No subscriptions yet</div>':'');
  document.querySelectorAll('#sidebar .sidebar-item[data-view]').forEach(el=>{el.onclick=()=>{state.currentView=el.dataset.view;state.activeCategory='All';state.searchQuery='';render();if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('mobile-open');};});
  document.getElementById('sidebar').classList.toggle('collapsed',!state.sidebarOpen);
  document.getElementById('main').classList.toggle('expanded',!state.sidebarOpen);
}

function renderMain() {
  const m=document.getElementById('main');
  if(state.currentView==='player')renderPlayer(m);
  else if(state.currentView==='profile')renderProfile(m);
  else renderVideoGrid(m);
}

function renderVideoGrid(main) {
  let videos=getVideos().filter(v=>v.visibility==='public'&&!v.isClip);
  if(state.currentView==='trending')videos.sort((a,b)=>b.views-a.views);
  else if(state.currentView==='history'){const hm={};getHistory().forEach((h,i)=>hm[h.videoId]=i);videos=videos.filter(v=>hm[v.id]!==undefined).sort((a,b)=>hm[a.id]-hm[b.id]);}
  else if(state.currentView==='liked'){const likes=getLikes();videos=videos.filter(v=>likes.includes(v.id));}
  else if(state.currentView==='profile'&&state.currentUser)videos=getVideos().filter(v=>v.channel===state.currentUser.id&&!v.isClip);
  if(state.activeCategory!=='All')videos=videos.filter(v=>v.category===state.activeCategory);
  if(state.searchQuery.trim()){const q=state.searchQuery.toLowerCase();videos=videos.filter(v=>v.title.toLowerCase().includes(q)||v.channelName.toLowerCase().includes(q)||v.description.toLowerCase().includes(q)||v.category.toLowerCase().includes(q));}
  if(state.currentView==='home')videos.sort((a,b)=>b.uploadedAt-a.uploadedAt);

  let html='';
  if(['home','trending','profile'].includes(state.currentView)){
    html+=`<div class="chips-wrap"><div class="chips">${CATEGORIES.map(c=>`<button class="chip ${state.activeCategory===c?'active':''}" data-cat="${c}">${c}</button>`).join('')}</div></div>`;
  }
  const titles={home:'',trending:'Trending',history:'Watch History',liked:'Liked Videos',profile:'Your Videos'};
  if(titles[state.currentView]){
    html+=`<div class="section-header"><h2 class="section-title">${titles[state.currentView]}</h2>`;
    if(state.currentView==='history'&&getHistory().length>0)html+=`<button class="btn-danger btn-sm" id="clearHistoryBtn"><i class="fas fa-trash-alt"></i> Clear History</button>`;
    html+=`</div>`;
  }
  if(videos.length===0){
    const emptyMap={home:{icon:'fa-video',h:'No videos yet',p:'Be the first to upload a video and share it with the world.',btn:state.currentUser?{label:'Upload Video',icon:'fa-upload',action:'openUploadModal()'}:{label:'Sign In to Upload',icon:'fa-sign-in-alt',action:"openModal('authModal')"}},trending:{icon:'fa-fire',h:'No trending videos',p:'Videos will appear here as they get more views.'},history:{icon:'fa-history',h:'No watch history',p:'Videos you watch will show up here.'},liked:{icon:'fa-thumbs-up',h:'No liked videos',p:'Videos you like will show up here.'},profile:{icon:'fa-film',h:'No videos yet',p:'Upload your first video to get started.',btn:{label:'Upload Video',icon:'fa-upload',action:'openUploadModal()'}}};
    const e=state.searchQuery.trim()?{icon:'fa-search',h:'No results found',p:'Try different keywords or remove the search filter.',btn:{label:'Clear Search',icon:'fa-times',action:'clearSearch()'}}:(emptyMap[state.currentView]||emptyMap.home);
    html+=`<div class="empty-state"><i class="fas ${e.icon}"></i><h2>${e.h}</h2><p>${e.p}</p>${e.btn?`<button class="btn-primary" onclick="${e.btn.action}"><i class="fas ${e.btn.icon}"></i> ${e.btn.label}</button>`:''}</div>`;
  } else {
    html+=`<div class="video-grid">${videos.map(v=>renderVideoCard(v)).join('')}</div>`;
  }
  main.innerHTML=html;
  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{state.activeCategory=c.dataset.cat;render();});
  main.querySelectorAll('.video-card').forEach(card=>card.onclick=(e)=>{if(!e.target.closest('.delete-btn'))openVideo(card.dataset.id);});
  main.querySelectorAll('.delete-btn').forEach(b=>b.onclick=(e)=>{e.stopPropagation();deleteVideo(b.dataset.id);});
  const clearBtn=document.getElementById('clearHistoryBtn');
  if(clearBtn)clearBtn.onclick=()=>{showConfirm('Clear Watch History','This will remove all videos from your watch history.',()=>{saveHistory([]);showToast('Watch history cleared');render();});};
}

function renderClipsFeed() {
  const feed=document.getElementById('clipsFeed');
  const clips=getVideos().filter(v=>v.isClip&&v.visibility==='public').sort((a,b)=>b.uploadedAt-a.uploadedAt);
  if(clips.length===0){feed.innerHTML=`<div class="clips-empty"><i class="fas fa-bolt"></i><h2 style="font-size:22px;margin-bottom:8px">No clips yet</h2><p style="color:var(--fg3);font-size:15px">Be the first to upload a short clip</p></div>`;return;}
  feed.innerHTML=clips.map(v=>`<div class="clip-slide" data-id="${v.id}">
    ${v.videoData?`<video src="${v.videoData}" loop ${state.clipsMuted?'muted':''} playsinline preload="metadata"></video>`:`<div class="no-video-thumb"></div>`}
    <div class="clip-info-panel">
      <div class="clip-channel"><img src="${getChannelAvatar(v.channelName)}"><span class="clip-channel-name">${escHtml(v.channelName)}</span>${state.currentUser&&v.channel!==state.currentUser.id?`<button class="clip-sub-btn" data-channel="${v.channelName}">Sub</button>`:''}</div>
      <div class="clip-title">${escHtml(v.title)}</div>
    </div>
    <div class="clip-action-rail">
      <div class="clip-action"><button class="${getLikes().includes(v.id)?'liked':''}" data-like="${v.id}"><i class="fas fa-heart"></i></button><span class="clip-action-count">${formatViews(v.likes)}</span></div>
      <div class="clip-action"><button data-comment="${v.id}"><i class="fas fa-comment-dots"></i></button><span class="clip-action-count">${getComments(v.id).length}</span></div>
      <div class="clip-action"><button data-share><i class="fas fa-share"></i></button><span class="clip-action-count">Share</span></div>
    </div>
  </div>`).join('');

  /* Intersection observer for autoplay */
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const vid=entry.target.querySelector('video');
      if(!vid)return;
      if(entry.isIntersecting&&entry.intersectionRatio>0.7){vid.play().catch(()=>{});}
      else{vid.pause();vid.currentTime=0;}
    });
  },{threshold:[0.7]});
  feed.querySelectorAll('.clip-slide').forEach(s=>observer.observe(s));

  /* Tap to pause/play */
  feed.querySelectorAll('.clip-slide').forEach(slide=>{
    slide.addEventListener('click',(e)=>{
      if(e.target.closest('button')||e.target.closest('.clip-info-panel'))return;
      const vid=slide.querySelector('video');if(!vid)return;
      if(vid.paused)vid.play().catch(()=>{});else vid.pause();
    });
  });

  /* Like buttons */
  feed.querySelectorAll('[data-like]').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();toggleLike(btn.dataset.like);renderClipsFeed();};});
  /* Comment buttons */
  feed.querySelectorAll('[data-comment]').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();openComments(btn.dataset.comment);};});
  /* Sub buttons */
  feed.querySelectorAll('.clip-sub-btn').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();toggleSubscribe(btn.dataset.channel);renderClipsFeed();};});
  /* Share */
  feed.querySelectorAll('[data-share]').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();showToast('Link copied (simulated)');};});
}

function toggleLike(vid) {
  if(!state.currentUser){showToast('Sign in to like');return;}
  let likes=getLikes(),videos=getVideos(),v=videos.find(x=>x.id===vid);if(!v)return;
  const idx=likes.indexOf(vid);
  if(idx>=0){likes.splice(idx,1);v.likes=Math.max(0,v.likes-1);}else{likes.push(vid);v.likes++;}
  saveLikes(likes);saveVideos(videos);
}

function toggleSubscribe(channelName) {
  if(!state.currentUser||channelName===state.currentUser.displayName)return;
  const key='mt_subs_'+state.currentUser.id;
  let subs=JSON.parse(localStorage.getItem(key)||'[]');
  const idx=subs.indexOf(channelName);
  if(idx>=0){subs.splice(idx,1);showToast('Unsubscribed from '+channelName);}
  else{subs.push(channelName);showToast('Subscribed to '+channelName);}
  localStorage.setItem(key,JSON.stringify(subs));
}

/* ===== AUTH ===== */
async function doLogin() {
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email){showFormError('loginError','Email is required');return;}
  if(!email.includes('@')){showFormError('loginError','Enter a valid email');return;}
  if(!pass){showFormError('loginError','Password is required');return;}

  if(sb){
    const result=await sbSignIn(email,pass);
    if(result.error){showFormError('loginError',result.error.message);return;}
    state.currentUser={id:result.data.user.id,email:result.data.user.email,displayName:result.data.profile.display_name,avatar:result.data.profile.avatar_url};
    localStorage.setItem('mt_session',result.data.user.id);
    const localAvatar=localStorage.getItem('mt_user_avatar');
    if(localAvatar){state.currentUser.avatar=localAvatar;}
  } else {
    /* Fallback local auth */
    const users=JSON.parse(localStorage.getItem('mt_local_users')||'{}');
    const user=users[email];
    if(!user){showFormError('loginError','No account found with this email');return;}
    if(user.password!==pass){showFormError('loginError','Incorrect password');return;}
    state.currentUser={id:user.id,email,displayName:user.displayName,avatar:localStorage.getItem('mt_user_avatar_'+user.id)};
    localStorage.setItem('mt_session',user.id);
  }
  closeModal('authModal');showToast('Welcome back!');render();
}

async function doRegister() {
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  const confirm=document.getElementById('regPassConfirm').value;
  if(!name){showFormError('regError','Display name is required');return;}
  if(name.length<2){showFormError('regError','Name must be at least 2 characters');return;}
  if(!email){showFormError('regError','Email is required');return;}
  if(!email.includes('@')||!email.includes('.')){showFormError('regError','Enter a valid email');return;}
  if(!pass){showFormError('regError','Password is required');return;}
  if(pass.length<6){showFormError('regError','Password must be at least 6 characters');return;}
  if(pass!==confirm){showFormError('regError','Passwords do not match');return;}

  if(sb){
    const result=await sbSignUp(email,pass,name);
    if(result.error){showFormError('regError',result.error.message);return;}
    state.currentUser={id:result.data.user.id,email,displayName:name,avatar:null};
    localStorage.setItem('mt_session',result.data.user.id);
  } else {
    const users=JSON.parse(localStorage.getItem('mt_local_users')||'{}');
    if(users[email]){showFormError('regError','An account with this email already exists');return;}
    const id=genId();
    users[email]={id,password:pass,displayName:name};
    localStorage.setItem('mt_local_users',JSON.stringify(users));
    state.currentUser={id,email,displayName:name,avatar:null};
    localStorage.setItem('mt_session',id);
  }
  closeModal('authModal');showToast('Account created! Welcome, '+name);render();
}

async function logout() {
  await sbSignOut();
  state.currentUser=null;
  localStorage.removeItem('mt_session');
  localStorage.removeItem('mt_user_avatar');
  state.currentView='home';state.userDropdownOpen=false;
  showToast('Signed out');render();
}

}

function resetVideoZone(){const z=document.getElementById('videoZone');z.classList.remove('has-file');z.innerHTML=`<input type="file" id="videoInput" accept="video/*"><i class="fas fa-film"></i><p>Click to select a <span class="accent">video file</span></p><p style="font-size:12px;color:var(--fg3);margin-top:8px">MP4, WebM, OGG, MOV supported</p>`;bindVideoZone();}
function resetThumbZone(){const z=document.getElementById('thumbZone');z.classList.remove('has-file');z.innerHTML=`<input type="file" id="thumbInput" accept="image/*"><i class="fas fa-image"></i><p>Click to upload custom thumbnail</p>`;document.getElementById('thumbPreviewBox').innerHTML='<span class="placeholder-text">Auto-generated<br>from video</span>';bindThumbZone();}

function updateStorageBar(){const used=getStoreSize(),max=MAX_STORAGE_MB*1024*1024,pct=Math.min(100,(used/max)*100);document.getElementById('storageBar').innerHTML=`<div class="storage-bar"><div><strong>Storage:</strong> ${formatBytes(used)} / ${MAX_STORAGE_MB} MB</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;${pct>80?'background:#ff595e':''}"></div></div><div class="bar-text"><span>Stored in your browser</span><span>${pct.toFixed(1)}%</span></div></div>`;}

function bindVideoZone(){
  const z=document.getElementById('videoZone'),inp=document.getElementById('videoInput');
  z.onclick=()=>inp.click();
  inp.onchange=()=>{
    const file=inp.files[0];if(!file)return;
    if(!file.type.startsWith('video/')){showFormError('uploadError','Please select a valid video file');return;}
    state.uploadedVideoName=file.name;state.uploadedVideoSize=file.size;
    const reader=new FileReader();
    reader.onload=(e)=>{
      state.uploadedVideoData=e.target.result;z.classList.add('has-file');
      z.innerHTML=`<input type="file" id="videoInput" accept="video/*" style="display:none"><div class="upload-file-info"><i class="fas fa-film"></i><div><div class="file-name">${escHtml(file.name)}</div><div class="file-size">${formatBytes(file.size)}</div><div class="change-link">Click to change</div></div></div>`;
      bindVideoZone();
      const vid=document.createElement('video');vid.preload='metadata';vid.src=e.target.result;
      vid.onloadedmetadata=()=>{state.videoDuration=formatDuration(vid.duration);};
      if(!state.uploadedThumbData){genThumbFromVideo(e.target.result,'').then(thumb=>{document.getElementById('thumbPreviewBox').innerHTML=`<img src="${thumb}">`;state.uploadedThumbData=thumb;});}
      updateStorageBar();
    };reader.readAsDataURL(file);
  };
}

function bindThumbZone(){
  const z=document.getElementById('thumbZone'),inp=document.getElementById('thumbInput');
  z.onclick=()=>inp.click();
  inp.onchange=()=>{
    const file=inp.files[0];if(!file)return;
    if(!file.type.startsWith('image/')){showFormError('uploadError','Select a valid image');return;}
    const reader=new FileReader();
    reader.onload=(e)=>{state.uploadedThumbData=e.target.result;z.classList.add('has-file');z.innerHTML=`<input type="file" id="thumbInput" accept="image/*" style="display:none"><div style="text-align:center"><i class="fas fa-check-circle" style="font-size:24px;color:#2a9d8f;margin-bottom:4px"></i><p style="font-size:12px;color:var(--fg2)">Thumbnail set</p></div>`;document.getElementById('thumbPreviewBox').innerHTML=`<img src="${e.target.result}">`;bindThumbZone();};
    reader.readAsDataURL(file);
  };
}

async function doUpload() {
  if(!state.currentUser){showToast('Sign in to upload');return;}
  const title=document.getElementById('uploadTitle').value.trim();
  const desc=document.getElementById('uploadDesc').value.trim();
  const cat=document.getElementById('uploadCat').value;
  const vis=document.getElementById('uploadVis').value;
  if(!state.uploadedVideoData){showFormError('uploadError','Please select a video file');return;}
  if(!title){showFormError('uploadError','Title is required');return;}
  if(title.length<3){showFormError('uploadError','Title must be at least 3 characters');return;}
  const currentSize=getStoreSize(),newSize=state.uploadedVideoData.length+(state.uploadedThumbData?state.uploadedThumbData.length:0);
  if(currentSize+newSize>MAX_STORAGE_MB*1024*1024*0.95){showFormError('uploadError','Not enough storage. Used: '+formatBytes(currentSize)+', file: '+formatBytes(newSize)+'. Try a smaller video.');return;}
  let thumb=state.uploadedThumbData;if(!thumb)thumb=await genThumbFromVideo(state.uploadedVideoData,title);
  const video={id:genId(),title,description:desc||'No description.',channel:state.currentUser.id,channelName:state.currentUser.displayName,category:cat,thumbnail:thumb,duration:state.videoDuration,views:0,likes:0,uploadedAt:Date.now(),visibility:vis,videoData:state.uploadedVideoData,isClip:state.uploadType==='clip'};
  const videos=getVideos();videos.unshift(video);saveVideos(videos);
  closeModal('uploadModal');showToast((state.uploadType==='clip'?'Clip':'Video')+' uploaded successfully!');
  state.currentView='profile';render();
}

/* ===== GLOBAL EVENTS ===== */
document.getElementById('menuToggle').onclick=()=>{if(window.innerWidth<=768)document.getElementById('sidebar').classList.toggle('mobile-open');else{state.sidebarOpen=!state.sidebarOpen;render();}};
document.getElementById('logoBtn').onclick=goHome;
document.getElementById('searchBtn').onclick=()=>{state.searchQuery=document.getElementById('searchInput').value;state.currentView='home';state.activeCategory='All';render();};
document.getElementById('searchInput').onkeydown=(e)=>{if(e.key==='Enter'){state.searchQuery=e.target.value;state.currentView='home';state.activeCategory='All';render();}};
document.getElementById('uploadFab').onclick=openUploadModal;
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPass').onkeydown=(e)=>{if(e.key==='Enter')doLogin();};
document.getElementById('registerBtn').onclick=doRegister;
document.getElementById('regPassConfirm').onkeydown=(e)=>{if(e.key==='Enter')doRegister();};
document.getElementById('showRegister').onclick=(e)=>{e.preventDefault();document.getElementById('authLoginForm').style.display='none';document.getElementById('authRegisterForm').style.display='block';document.getElementById('authModalTitle').textContent='Create Account';};
document.getElementById('showLogin').onclick=(e)=>{e.preventDefault();document.getElementById('authRegisterForm').style.display='none';document.getElementById('authLoginForm').style.display='block';document.getElementById('authModalTitle').textContent='Sign In';};
document.getElementById('uploadSubmitBtn').onclick=doUpload;

document.querySelectorAll('#uploadTypeToggle button').forEach(btn=>{btn.onclick=()=>{state.uploadType=btn.dataset.type;document.querySelectorAll('#uploadTypeToggle button').forEach(b=>b.classList.toggle('active',b.dataset.type===state.uploadType));};});

document.getElementById('clipsBackBtn').onclick=goHome;
document.getElementById('clipsMuteBtn').onclick=()=>{state.clipsMuted=!state.clipsMuted;document.getElementById('clipsMuteIcon').className=state.clipsMuted?'fas fa-volume-mute':'fas fa-volume-up';document.querySelectorAll('#clipsFeed video').forEach(v=>{v.muted=state.clipsMuted;});};

document.addEventListener('click',()=>{if(state.userDropdownOpen){state.userDropdownOpen=false;const d=document.getElementById('userDropdown');if(d)d.classList.remove('show');}});
document.querySelectorAll('.modal-overlay').forEach(o=>o.onclick=(e)=>{if(e.target===o)o.classList.remove('show');});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));});

/* ===== INIT ===== */
bindVideoZone();bindThumbZone();
initServer();

/* Restore session */
async function restoreSession() {
  const sessionId = localStorage.getItem('mt_session');
  if (!sessionId) return;
  if (sb) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
        state.currentUser = { id: session.user.id, email: session.user.email, displayName: profile?.display_name || 'User', avatar: profile?.avatar_url };
        const localAvatar = localStorage.getItem('mt_user_avatar');
        if (localAvatar) state.currentUser.avatar = localAvatar;
        render(); return;
      }
    } catch(e) {}
  }
  /* Fallback: check local users */
  const users = JSON.parse(localStorage.getItem('mt_local_users') || '{}');
  for (let email in users) {
    if (users[email].id === sessionId) {
      state.currentUser = { id: users[email].id, email, displayName: users[email].displayName, avatar: localStorage.getItem('mt_user_avatar_' + users[email].id) };
      const localAvatar = localStorage.getItem('mt_user_avatar');
      if (localAvatar) state.currentUser.avatar = localAvatar;
      break;
    }
  }
  render();
}
restoreSession();
