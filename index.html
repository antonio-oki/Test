<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android 1.0 Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="phone">
    <div id="status-bar">
        <span id="time">0:00 AM</span>
        <span class="status-right">Signal █ 100%</span>
    </div>
    
    <div id="desktop">
        <div class="icon">Clock</div>
        <div class="icon">Settings</div>
        <div class="icon">Calculator</div>
    </div>
    
    <div id="drawer">
        <div class="drawer-header">Drag to see all apps</div>
        <div class="grid">
            <div class="icon">Maps</div>
            <div class="icon">Browser</div>
            <div class="icon">Market</div>
            <div class="icon">Camera</div>
            <div class="icon">Gallery</div>
            <div class="icon">Music</div>
        </div>
    </div>
    
    <div id="handle" onclick="toggleDrawer()">▲</div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        document.getElementById('time').innerText = hours + ":" + minutes + " " + ampm;
    }
    
    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
