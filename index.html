<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Android 1.0 Sim</title>
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; }
        #phone { width: 320px; height: 480px; background: #000; position: relative; overflow: hidden; border: 8px solid #222; border-radius: 20px; }
        
        #status-bar { height: 25px; background: #000; color: #fff; font-size: 12px; padding: 5px; display: flex; justify-content: space-between; }
        #desktop { height: 400px; background: linear-gradient(#060, #000); }
        
        #drawer { 
            position: absolute; bottom: -400px; width: 100%; height: 400px; 
            background: #222; transition: bottom 0.3s; display: grid; grid-template-columns: repeat(3, 1fr); padding: 10px;
        }
        #drawer.open { bottom: 0; }
        
        .icon { width: 50px; height: 50px; background: #555; margin: 10px; border-radius: 5px; text-align: center; color: white; line-height: 50px; font-size: 10px; }
        #handle { position: absolute; bottom: 0; width: 100%; height: 40px; background: #444; color: white; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="phone">
    <div id="status-bar"><span id="time">0:00</span><span>GSM</span></div>
    <div id="desktop"></div>
    <div id="drawer">
        <div class="icon">Maps</div>
        <div class="icon">Browser</div>
        <div class="icon">Market</div>
        <div class="icon">Camera</div>
    </div>
    <div id="handle" onclick="document.getElementById('drawer').classList.toggle('open')">▲ App Drawer</div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('time').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
