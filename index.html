<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom MP3 Player</title>
    <style>
        /* --- CSS Styling --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212; /* Dark background like Spotify */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            margin-top: 0;
            color: #1DB954; /* Spotify Green accent */
            font-size: 1.8em;
        }
        #audioPlayer {
            width: 100%;
            margin: 20px 0;
            border-radius: 5px;
        }
        controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s, transform 0.1s;
            flex-grow: 1;
        }
        #importButton {
            background-color: #1DB954;
            color: white;
            font-weight: bold;
        }
        #importButton:hover {
            background-color: #00A844;
            transform: scale(1.05);
        }

        #message {
            margin-top: 15px;
            padding: 8px;
            background-color: #3a3a3a;
            border-radius: 4px;
            color: #FFD700; /* Gold/Yellow for info */
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎵 My Custom Player</h1>
        
        <!-- The core HTML Audio Element -->
        <audio id="audioPlayer" controls></audio>

        <!-- Button to trigger the hidden file input -->
        <button id="importButton">📂 Import MP3 File</button>
        
        <div id="message">Select an MP3 file to begin playing!</div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const importButton = document.getElementById('importButton');
        const messageDisplay = document.getElementById('message');
        const fileInput = document.getElementById('audioFileSelector');

        // --- 1. Event Listener to trigger the hidden file input ---
        importButton.addEventListener('click', () => {
            fileInput.click(); // Triggers the actual file selection dialog
        });

        // --- 2. Event Listener for when a file is selected ---
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];

            if (file) {
                // Check if the file is actually an audio type (basic check)
                if (file.type.startsWith('audio/')) {
                    playAudio(file);
                } else {
                    showMessage('Error: Please select a valid audio file (MP3).', true);
                }
            } else {
                showMessage('No file selected.', true);
            }
        });

        // --- 3. Core Function to load and play the audio ---
        function playAudio(file) {
            // Create a temporary URL for the file to be played by the audio element
            const fileURL = URL.createObjectURL(file);
            
            audioPlayer.src = fileURL;
            
            // UI feedback
            showMessage(`Now playing: ${file.name}`);
            
            // Attempt to play the audio automatically
            audioPlayer.play().then(() => {
                console.log("Playback started.");
            }).catch(error => {
                console.error("Playback failed:", error);
                showMessage("Playback error. Try refreshing.", true);
            });

        }

        // --- 4. Helper function to update the status message ---
        function showMessage(msg, isError = false) {
            messageDisplay.textContent = msg;
            if (isError) {
                messageDisplay.style.backgroundColor = '#552222';
            } else {
                messageDisplay.style.backgroundColor = '#3a3a3a';
            }
        }

    </script>
</body>
</html>
