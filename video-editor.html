<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Video Frame Editor</title><style>body{font-family:Arial;background:#111;color:#fff;padding:12px;margin:0}video,canvas{width:100%;background:#000;border-radius:12px;margin-top:8px}button,input{padding:12px;margin:4px;border-radius:10px;border:none}#frames{display:flex;gap:8px;overflow:auto;margin-top:10px}img{width:90px;height:60px;object-fit:cover;border:3px solid #444;border-radius:8px}</style></head><body><h2>Mobile Video Frame Editor</h2><input id='upload' type='file' accept='video/*'><video id='video' playsinline controls></video><canvas id='canvas'></canvas><div><button onclick='move(-1)'>◀ Frame</button><button onclick='move(1)'>Frame ▶</button><button onclick='addFrame()'>Add Frame</button><button onclick='removeFrame()'>Delete Frame</button></div><div id='time'></div><div id='frames'></div><script>const video=v=document.getElementById('video');const c=document.getElementById('canvas');const x=c.getContext('2d');const frames=[];let selected=-1;upload.onchange=e=>video.src=URL.createObjectURL(e.target.files[0]);video.onloadedmetadata=()=>{c.width=v.videoWidth||1280;c.height=v.videoHeight||720;draw()};video.onseeked=draw;function draw(){x.drawImage(v,0,0,c.width,c.height);time.textContent='time '+v.currentTime.toFixed(3)+'s'}function move(d){v.pause();v.currentTime=Math.max(0,v.currentTime+d/30)}function addFrame(){draw();frames.push(c.toDataURL('image/jpeg'));render()}function removeFrame(){if(selected<0)return;frames.splice(selected,1);selected=-1;render()}function render(){const holder=document.getElementById('frames');holder.innerHTML='';frames.forEach((f,i)=>{let im=document.createElement('img');im.src=f;im.style.borderColor=i===selected?'lime':'#444';im.onclick=()=>{selected=i;render()};holder.appendChild(im)})}</script></body></html>
